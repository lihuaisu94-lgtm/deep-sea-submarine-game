<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海幽灵 — 核潜艇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050d17; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; font-family: 'Courier New', monospace; color: #7eb8da;
    z-index: 10;
  }
  #ui .corner { position: absolute; padding: 14px 18px; }
  #ui .tl { top: 0; left: 0; }
  #ui .tr { top: 0; right: 0; text-align: right; }
  #ui .bl { bottom: 0; left: 0; }
  #ui .br { bottom: 0; right: 0; text-align: right; }
  #ui .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #4a8db5; }
  #ui .value { font-size: 22px; font-weight: bold; color: #c3e0f0; }
  #ui .unit { font-size: 10px; color: #5a8da5; }
  #ui .warn { color: #e74c3c; animation: blink 0.6s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #7eb8da; font-family: 'Courier New', monospace; font-size: 18px;
    letter-spacing: 4px; z-index: 20; pointer-events: none;
  }
  /* ── Menu Overlay ── */
  #menu-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0a1628 0%, #1a2f4a 100%);
    font-family: 'Courier New', monospace;
  }
  #menu-overlay .menu-particle {
    position: absolute; border-radius: 50%; background: #fff;
    animation: menuFloat linear infinite;
    pointer-events: none;
  }
  @keyframes menuFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-120px) translateX(40px); opacity: 0; }
  }
  #menu-title {
    font-size: 48px; color: #4facfe; letter-spacing: 8px;
    text-shadow: 0 0 20px #4facfe, 0 0 40px rgba(79,172,254,0.4);
    margin-bottom: 6px;
  }
  #menu-subtitle {
    font-size: 14px; color: #7f8c8d; letter-spacing: 4px;
    margin-bottom: 48px;
  }
  #menu-overlay .menu-btn {
    width: 280px; height: 50px; border-radius: 8px;
    border: 1px solid #4facfe; background: transparent;
    color: #e0f0ff; font-size: 18px; font-family: 'Courier New', monospace;
    letter-spacing: 2px; cursor: pointer; margin: 8px 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
  #menu-overlay .menu-btn:hover {
    background: rgba(79,172,254,0.15);
    box-shadow: 0 0 12px rgba(79,172,254,0.4);
  }
  /* ── Lobby ── */
  #lobby-panel {
    display: none; flex-direction: column; align-items: center; gap: 14px;
    margin-top: 24px;
  }
  #lobby-panel input {
    width: 280px; height: 40px; border-radius: 6px;
    border: 1px solid #4facfe; background: rgba(0,0,0,0.4);
    color: #e0f0ff; font-size: 15px; font-family: 'Courier New', monospace;
    text-align: center; outline: none; letter-spacing: 2px;
  }
  #lobby-panel input::placeholder { color: #5a8da5; }
  #lobby-title {
    font-size: 22px; color: #4facfe; letter-spacing: 4px;
  }
  /* ── Game Over ── */
  #gameover-overlay {
    position: absolute; top:0; left:0; width:100%; height:100%;
    z-index:200; display:none; flex-direction:column; align-items:center;
    justify-content:center;
    background: rgba(5,13,23,0.92);
    font-family:'Courier New',monospace;
  }
  #gameover-title { font-size:36px; color:#e74c3c; letter-spacing:6px; margin-bottom:10px; }
  #gameover-winner { font-size:20px; color:#f6d365; letter-spacing:4px; margin-bottom:6px; }
  #gameover-reason { font-size:13px; color:#7f8c8d; letter-spacing:2px; margin-bottom:20px; }
  #gameover-stats { font-size:13px; color:#c3e0f0; line-height:2; letter-spacing:1px; margin-bottom:24px; text-align:center; }
  #gameover-stats span.k { color:#e74c3c; } #gameover-stats span.d { color:#7f8c8d; }
  #gameover-overlay .menu-btn { margin:6px 0; }
  /* ── HUD time ── */
  #time-val { color:#f6d365; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="corner tl">
    <div class="label">航速 SPEED</div>
    <div><span class="value" id="speed-val">0.0</span> <span class="unit">KN</span></div>
    <div style="margin-top:6px;" class="label">导弹 MISSILE</div>
    <div><span class="value" id="missile-val" style="color:#4a5568;">0 / 5</span></div>
    <div style="margin-top:6px;" class="label">击杀 KILLS</div>
    <div><span class="value" id="kill-val" style="color:#e74c3c;">0</span></div>
    <div style="margin-top:6px;" class="label">敌军 ENEMY</div>
    <div><span class="value" id="enemy-val" style="color:#f39c12;">0 / 5</span></div>
  </div>
  <div class="corner tr">
    <div class="label">航向 HEADING</div>
    <div><span class="value" id="head-val">000</span><span class="unit">°</span></div>
    <div style="margin-top:6px;" class="label">时间 TIME</div>
    <div><span class="value" id="time-val" style="color:#f6d365;">--:--</span></div>
  </div>
  <div class="corner bl">
    <div class="label">坐标 POS</div>
    <div><span class="value" id="pos-val">0, 0</span></div>
    <div style="margin-top:6px;" class="label">被动 PASSIVE</div>
    <div><span class="value" id="passive-val" style="color:#4facfe;">🔵 —</span></div>
  </div>
  <div class="corner br">
    <div class="label">主动 ACTIVE</div>
    <div><span class="value" id="active-val" style="color:#f6d365;">🟡 —</span></div>
    <div style="margin-top:6px;" class="label">深度 DEPTH</div>
    <div><span class="value" id="depth-val">200</span> <span class="unit">M</span></div>
  </div>
  <div id="skill-count" style="display:none; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    color:#4facfe; font-size:12px; font-family:'Courier New',monospace; opacity:0.7; letter-spacing:2px; z-index:10; pointer-events:none;"></div>
  <div id="collision-warn" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#e74c3c; font-size:20px; letter-spacing:4px;" class="warn">⚠ 接近陆地</div>
</div>
<div id="loading">▸ 系统启动中...</div>

<!-- ── Game Over Overlay ── -->
<div id="gameover-overlay">
  <div id="gameover-title">战斗结束</div>
  <div id="gameover-winner"></div>
  <div id="gameover-reason"></div>
  <div id="gameover-stats"></div>
  <button class="menu-btn" id="btn-rematch">再来一局</button>
  <button class="menu-btn" id="btn-back-lobby">返回大厅</button>
</div>

<!-- ── Chat Overlay ── -->
<div id="chat-box" style="display:none; position:absolute; bottom:100px; left:10px; width:280px; z-index:50; font-family:'Courier New',monospace; pointer-events:none;">
  <div id="chat-msgs" style="max-height:160px; overflow-y:hidden; font-size:11px; color:#c3e0f0; line-height:1.5;"></div>
</div>
<input type="text" id="chat-input" style="display:none; position:absolute; bottom:70px; left:10px; width:280px; height:28px; z-index:50; font-family:'Courier New',monospace; font-size:11px; background:rgba(0,0,0,0.6); border:1px solid #4a8db5; color:#c3e0f0; padding:0 8px; outline:none;" placeholder="按Enter发送聊天..." maxlength="80">

<!-- ── Main Menu Overlay ── -->
<div id="menu-overlay">
  <div id="menu-title">深海幽灵</div>
  <div id="menu-subtitle">NUCLEAR SUBMARINE</div>
  <button class="menu-btn" id="btn-single">单机模式  |  对抗AI</button>
  <button class="menu-btn" id="btn-dual">双人模式  |  本地同屏</button>
  <button class="menu-btn" id="btn-multi">联机模式  |  局域网</button>
  <div id="lobby-panel">
    <div id="lobby-title">联机大厅</div>
    <input type="text" id="server-ip" placeholder="服务器IP (默认127.0.0.1)" value="127.0.0.1" style="margin-bottom:4px;">
    <input type="text" id="lobby-nick" placeholder="输入你的代号" maxlength="12">
    <button class="menu-btn" id="btn-create">创建房间</button>
    <input type="text" id="room-id-input" placeholder="输入房间号" maxlength="12" style="margin-top:6px;">
    <button class="menu-btn" id="btn-join">加入房间</button>
    <div id="room-info" style="display:none; color:#4facfe; font-size:13px; letter-spacing:2px; margin-top:10px;"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  MENU SYSTEM
// ═══════════════════════════════════════════
const GameState = { mode: null, started: false };
const menuOverlay = document.getElementById('menu-overlay');
const lobbyPanel = document.getElementById('lobby-panel');
const menuTitle = document.getElementById('menu-title');
const menuSub = document.getElementById('menu-subtitle');

// Spawn floating particles in menu background
function spawnMenuParticles() {
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'menu-particle';
    const size = 1.5 + Math.random() * 3;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = (Math.random() * 100) + '%';
    p.style.top = (60 + Math.random() * 40) + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    menuOverlay.appendChild(p);
  }
}

function showMenu() {
  menuOverlay.style.display = 'flex';
  lobbyPanel.style.display = 'none';
  menuTitle.style.display = 'block';
  menuSub.style.display = 'block';
  document.getElementById('btn-single').style.display = 'inline-block';
  document.getElementById('btn-dual').style.display = 'inline-block';
  document.getElementById('btn-multi').style.display = 'inline-block';
}

function hideMenu() {
  menuOverlay.style.display = 'none';
}

function showLobby() {
  menuTitle.style.display = 'none';
  menuSub.style.display = 'none';
  document.getElementById('btn-single').style.display = 'none';
  document.getElementById('btn-dual').style.display = 'none';
  document.getElementById('btn-multi').style.display = 'none';
  lobbyPanel.style.display = 'flex';
}

// ── Button handlers ──
document.getElementById('btn-single').addEventListener('click', () => {
  GameState.mode = 'single';
  GameState.started = true;
  hideMenu();
  document.getElementById('loading').style.display = 'none';
  startGame();
});

document.getElementById('btn-dual').addEventListener('click', () => {
  GameState.mode = 'dual';
  GameState.started = true;
  hideMenu();
  document.getElementById('loading').style.display = 'none';
  startDualGame();
});

document.getElementById('btn-multi').addEventListener('click', () => {
  GameState.mode = 'multi';
  showLobby();
});

document.getElementById('btn-create').addEventListener('click', () => {
  const nick = document.getElementById('lobby-nick').value.trim() || 'Captain';
  const ip = document.getElementById('server-ip').value.trim() || '127.0.0.1';
  connectServer(ip, () => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'create_room', nick }));
  });
});

document.getElementById('btn-join').addEventListener('click', () => {
  const nick = document.getElementById('lobby-nick').value.trim() || 'Sailor';
  const ip = document.getElementById('server-ip').value.trim() || '127.0.0.1';
  const roomId = document.getElementById('room-id-input').value.trim();
  if (!roomId) { alert('请输入房间号'); return; }
  connectServer(ip, () => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'join_room', nick, roomId }));
  });
});

// Show menu on load
spawnMenuParticles();
showMenu();

// ═══════════════════════════════════════════
//  MULTIPLAYER CLIENT
// ═══════════════════════════════════════════
let ws = null;
let currentRoom = null;
let localColorIdx = 0;
const remotePlayers = new Map(); // colorIdx → { x, y, heading, speed, hp, alive, kills, nick }
const remoteMissiles = [];
let physicsSendTimer = 0;

function connectServer(ip, onOpen) {
  if (ws && ws.readyState === WebSocket.OPEN) { onOpen(); return; }
  if (ws) { try { ws.close(); } catch(e){} }
  ws = new WebSocket(`ws://${ip}:8080`);
  ws.onopen = () => { console.log('[MP] Connected'); onOpen(); };
  ws.onmessage = (e) => { try { handleServerMsg(JSON.parse(e.data)); } catch(err){} };
  ws.onclose = () => {
    console.log('[MP] Disconnected');
    currentRoom = null; remotePlayers.clear(); remoteMissiles.length = 0;
    document.getElementById('chat-box').style.display = 'none';
    document.getElementById('chat-input').style.display = 'none';
  };
  ws.onerror = () => { console.error('[MP] Connection error'); };
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'echo_reply':
      console.log('[MP] Echo RTT:', Date.now() - msg.sent, 'ms');
      break;
    case 'room_created':
    case 'room_joined':
      currentRoom = msg.roomId;
      localColorIdx = msg.colorIdx;
      sub.palette = subPalette(msg.colorIdx);
      sub.colorIdx = msg.colorIdx;
      document.getElementById('room-info').style.display = 'block';
      document.getElementById('room-info').textContent = `房间: ${msg.roomId} | 颜色: ${SUB_COLORS[msg.colorIdx].name}`;
      document.getElementById('chat-box').style.display = 'block';
      document.getElementById('chat-input').style.display = 'block';
      hideMenu();
      document.getElementById('loading').style.display = 'none';
      if (!GameState.started) { GameState.mode = 'multi'; GameState.started = true; startGame(); }
      break;
    case 'player_joined':
      remotePlayers.set(msg.colorIdx, { x:0, y:0, heading:0, speed:0, hp:100, alive:true, kills:0, nick:msg.nick });
      addChatMsg(`[系统] ${msg.nick} 加入了房间`);
      break;
    case 'player_left':
      remotePlayers.delete(msg.colorIdx);
      addChatMsg(`[系统] ${msg.nick} 离开了房间`);
      break;
    case 'room_state':
      remotePlayers.clear();
      for (const p of msg.players) {
        if (p.colorIdx !== localColorIdx) {
          remotePlayers.set(p.colorIdx, { x:p.x, y:p.y, heading:p.heading, speed:p.speed, hp:p.hp, alive:p.alive, kills:p.kills, nick:p.nick });
        }
      }
      break;
    case 'world_snapshot':
      // Update self from server authority
      const me = msg.players.find(p => p.colorIdx === localColorIdx);
      if (me) { sub.x = me.x; sub.y = me.y; sub.heading = me.heading; sub.speed = me.speed; sub.hp = me.hp; sub.alive = me.alive; sub.kills = me.kills; }
      // Update remote players
      for (const p of msg.players) {
        if (p.colorIdx === localColorIdx) continue;
        let rp = remotePlayers.get(p.colorIdx);
        if (!rp) { rp = { nick:p.nick }; remotePlayers.set(p.colorIdx, rp); }
        rp.x = p.x; rp.y = p.y; rp.heading = p.heading; rp.speed = p.speed; rp.hp = p.hp; rp.alive = p.alive; rp.kills = p.kills; rp.isStealth = p.isStealth;
      }
      // Sync missiles from server
      remoteMissiles.length = 0;
      for (const sm of (msg.missiles||[])) {
        if (sm.ownerId === localColorIdx) continue;
        const m = new Missile(sm.x, sm.y, sm.heading);
        m.isRemote = true; m.isEnemy = false;
        remoteMissiles.push(m);
      }
      // Sync skills
      skills.length = 0;
      for (const ss of (msg.skills||[])) {
        skills.push({ x:ss.x, y:ss.y, typeId:ss.type, def:SKILL_DEFS[ss.type], baseY:ss.y, haloAngle:Math.random()*Math.PI*2, age:0, alive:true, update(dt){this.age+=dt;this.haloAngle+=dt*2.5;}, draw(ctx){ /* server authoring — draw handled locally */ }, isDead(){return false;} });
      }
      // Sync mines
      mines.length = 0;
      for (const sm of (msg.mines||[])) { mines.push({ x:sm.x, y:sm.y, placedAt:sm.placedAt, immuneUntil:sm.placedAt+3, lifetime:60, radius:8, triggerR:60, alive:true, haloA:0 }); }
      // Sync lasers
      lasers.length = 0;
      for (const sl of (msg.lasers||[])) { lasers.push({ x:sl.x, y:sl.y, angle:sl.angle, length:sl.length, life:sl.life, maxLife:sl.maxLife }); }
      // Time
      if (msg.timeLeft !== undefined) lastTimeLeft = msg.timeLeft;
      break;
    case 'missile_spawn':
      if (msg.playerColor !== localColorIdx) {
        const m = new Missile(msg.x, msg.y, msg.heading);
        m.isEnemy = false; m.isRemote = true;
        if (msg.scale) m.scale = msg.scale;
        if (msg.speed) m.speed = msg.speed;
        remoteMissiles.push(m);
      }
      break;
    case 'skill_event':
      if (msg.playerColor !== localColorIdx) {
        if (msg.skillType === 'LASER') {
          lasers.push({ x:msg.x, y:msg.y, angle:msg.heading, length:1500, life:0.4, maxLife:0.4 });
        }
      }
      break;
    case 'player_died':
      addChatMsg(`[系统] ${SUB_COLORS[msg.killerColor]?.name||'?'} 击杀 ${SUB_COLORS[msg.colorIdx]?.name||'?'}${msg.weapon?' ('+msg.weapon+')':''}`);
      break;
    case 'game_over':
      showGameOver(msg);
      break;
    case 'chat':
      addChatMsg(`[${msg.nick}] ${msg.text}`);
      break;
  }
}

function sendInput() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !currentRoom) return;
  ws.send(JSON.stringify({
    type: 'input',
    w: keys['w']||keys['arrowup']||false,
    a: keys['a']||keys['arrowleft']||false,
    s: keys['s']||keys['arrowdown']||false,
    d: keys['d']||keys['arrowright']||false,
    fire: keys[' ']||false,
  }));
}

function broadcastMissile(missile) {
  if (!ws || ws.readyState !== WebSocket.OPEN || !currentRoom) return;
  ws.send(JSON.stringify({
    type: 'missile_fire',
    x: missile.x, y: missile.y, heading: missile.heading,
    scale: missile.scale, speed: missile.speed,
  }));
}

function showGameOver(msg) {
  const ov = document.getElementById('gameover-overlay');
  ov.style.display = 'flex';
  document.getElementById('gameover-winner').textContent = msg.winnerNick ? `胜者: ${msg.winnerNick}` : '平局';
  document.getElementById('gameover-reason').textContent = msg.reason === 'kill' ? '击杀达到上限' : '时间到';
  let statsHTML = '';
  for (const s of (msg.stats||[])) {
    statsHTML += `<div>${SUB_COLORS[s.colorIdx]?.name||'?'} ${s.nick}: <span class="k">${s.kills}杀</span> / <span class="d">${s.deaths}死</span></div>`;
  }
  document.getElementById('gameover-stats').innerHTML = statsHTML;
}
document.getElementById('btn-rematch').addEventListener('click', () => {
  document.getElementById('gameover-overlay').style.display = 'none';
  // Re-join same room
  if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
    ws.send(JSON.stringify({ type:'rematch' }));
  }
});
document.getElementById('btn-back-lobby').addEventListener('click', () => {
  document.getElementById('gameover-overlay').style.display = 'none';
  if (ws) { try { ws.close(); } catch(e){} } ws = null;
  currentRoom = null; remotePlayers.clear(); remoteMissiles.length = 0;
  document.getElementById('chat-box').style.display = 'none';
  document.getElementById('chat-input').style.display = 'none';
  showMenu();
});
let lastTimeLeft = -1;
// Chat
const chatMsgs = [];
function addChatMsg(text) {
  chatMsgs.push(text);
  if (chatMsgs.length > 20) chatMsgs.shift();
  document.getElementById('chat-msgs').innerHTML = chatMsgs.map(t => `<div>${t}</div>`).join('');
  const el = document.getElementById('chat-msgs');
  el.scrollTop = el.scrollHeight;
}
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const text = e.target.value.trim();
    if (text && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'chat', text }));
      addChatMsg(`[我] ${text}`);
    }
    e.target.value = '';
  }
});

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const WORLD_W = 4800;
const WORLD_H = 2400;
const OCEAN_DEEP  = '#0a1628';
const LAND_FILL   = '#c2b280';
const LAND_STROKE = '#8b7d5e';
const GRID_COLOR  = 'rgba(30,60,90,0.30)';
const GRID_MAJOR  = 'rgba(40,80,120,0.45)';

// ═══════════════════════════════════════════
//  SKILL TYPE DEFINITIONS
// ═══════════════════════════════════════════
const SKILL_DEFS = {
  MISSILE_BIG:  { id:'MISSILE_BIG',  tier:'blue', charges:3, label:'BIG',   desc:'导弹变大' },
  MISSILE_FAST: { id:'MISSILE_FAST', tier:'blue', charges:3, label:'FAST',  desc:'导弹加速' },
  MULTI_HEAD:   { id:'MULTI_HEAD',   tier:'blue', charges:6, label:'MULTI', desc:'多弹头' },
  STEALTH:      { id:'STEALTH',      tier:'gold', charges:0, label:'STLTH', desc:'隐身' },
  LASER:        { id:'LASER',        tier:'gold', charges:0, label:'LASER', desc:'激光' },
  DECOY:        { id:'DECOY',        tier:'gold', charges:0, label:'DECOY', desc:'诱饵' },
  MINE:         { id:'MINE',         tier:'gold', charges:0, label:'MINE',  desc:'水雷' },
};
const BLUE_IDS  = ['MISSILE_BIG','MISSILE_FAST','MULTI_HEAD'];
const GOLD_IDS  = ['STEALTH','LASER','DECOY','MINE'];
const ALL_SKILL_IDS = [...BLUE_IDS, ...GOLD_IDS];

// ═══════════════════════════════════════════
//  SUBMARINE COLORS

function wrapX(x) {
  while (x < 0) x += WORLD_W;
  while (x >= WORLD_W) x -= WORLD_W;
  return x;
}

function wrappedDistX(a, b) {
  let dx = b - a;
  if (dx > WORLD_W / 2) dx -= WORLD_W;
  else if (dx < -WORLD_W / 2) dx += WORLD_W;
  return dx;
}

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true; keys[e.code] = true;
  // P1
  if (e.key === 'w' || e.key === 'W') p1Input.w = true;
  if (e.key === 'a' || e.key === 'A') p1Input.a = true;
  if (e.key === 's' || e.key === 'S') p1Input.s = true;
  if (e.key === 'd' || e.key === 'D') p1Input.d = true;
  if (e.key === ' ') { p1Input.fire = true; e.preventDefault(); }
  if (e.key === 'x' || e.key === 'X') p1Input.skill = true;
  // P2
  if (e.key === 'ArrowUp')    { p2Input.up = true; e.preventDefault(); }
  if (e.key === 'ArrowLeft')  { p2Input.left = true; e.preventDefault(); }
  if (e.key === 'ArrowDown')  { p2Input.down = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { p2Input.right = true; e.preventDefault(); }
  if (e.key === '+' || e.key === '=') p2Input.fire = true;
  if (e.key === '-') p2Input.skill = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false; keys[e.code] = false;
  if (e.key === 'w' || e.key === 'W') p1Input.w = false;
  if (e.key === 'a' || e.key === 'A') p1Input.a = false;
  if (e.key === 's' || e.key === 'S') p1Input.s = false;
  if (e.key === 'd' || e.key === 'D') p1Input.d = false;
  if (e.key === ' ') p1Input.fire = false;
  if (e.key === 'x' || e.key === 'X') p1Input.skill = false;
  if (e.key === 'ArrowUp')    p2Input.up = false;
  if (e.key === 'ArrowLeft')  p2Input.left = false;
  if (e.key === 'ArrowDown')  p2Input.down = false;
  if (e.key === 'ArrowRight') p2Input.right = false;
  if (e.key === '+' || e.key === '=') p2Input.fire = false;
  if (e.key === '-') p2Input.skill = false;
});

// ═══════════════════════════════════════════
//  LAND COLLISION DETECTION
// ═══════════════════════════════════════════

// Ray-casting point-in-polygon test
function pointInPolygon(px, py, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// Check if a circle at (cx,cy) with given radius overlaps any land
function checkLandCollision(cx, cy, radius) {
  const wx = wrapX(cx);
  const samples = 10;
  // Check center first (fast path)
  for (let c = 0; c < continents.length; c++) {
    if (pointInPolygon(wx, cy, continents[c].points)) return true;
  }
  // Check perimeter samples
  for (let i = 0; i < samples; i++) {
    const angle = (i / samples) * Math.PI * 2;
    const sx = wrapX(wx + Math.cos(angle) * radius);
    const sy = cy + Math.sin(angle) * radius;
    for (let c = 0; c < continents.length; c++) {
      if (pointInPolygon(sx, sy, continents[c].points)) return true;
    }
  }
  return false;
}

// Check if a specific point is on land (center only)
function isPointOnLand(x, y) {
  const wx = wrapX(x);
  for (let c = 0; c < continents.length; c++) {
    if (pointInPolygon(wx, y, continents[c].points)) return true;
  }
  return false;
}

// Open-water check: samples 8 points on a circle; >=75% water = open
function isOpenWater(x, y, radius) {
  const steps = 8;
  let ocean = 0;
  for (let i = 0; i < steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    if (!isPointOnLand(x + Math.cos(a) * radius, y + Math.sin(a) * radius)) ocean++;
  }
  return ocean >= 6;
}

// Find a random open-water position (with fallback)
function findOpenWaterPos(radius = 120, maxAttempts = 50) {
  for (let a = 0; a < maxAttempts; a++) {
    const sx = Math.random() * WORLD_W, sy = Math.random() * WORLD_H;
    if (!isPointOnLand(sx, sy) && isOpenWater(sx, sy, radius)) return { x: sx, y: sy };
  }
  // Fallback: wider radius
  for (let a = 0; a < 30; a++) {
    const sx = Math.random() * WORLD_W, sy = Math.random() * WORLD_H;
    if (!isPointOnLand(sx, sy) && isOpenWater(sx, sy, 200)) return { x: sx, y: sy };
  }
  // Last resort: any ocean point
  for (let a = 0; a < 100; a++) {
    const sx = Math.random() * WORLD_W, sy = Math.random() * WORLD_H;
    if (!isPointOnLand(sx, sy)) return { x: sx, y: sy };
  }
  return { x: Math.random() * WORLD_W, y: Math.random() * WORLD_H };
}

// ═══════════════════════════════════════════
//  MISSILE CLASS
// ═══════════════════════════════════════════
class Missile {
  constructor(x, y, heading) {
    this.x = x;
    this.y = y;
    this.heading = heading;   // locked direction
    this.speed = 840;         // sub.maxSpeed * 3
    this.life = 4.0;          // seconds
    this.age = 0;
    this.tailTimer = 0;       // accumulator for particle spawn
    this.alive = true;
    this.isEnemy = false;      // true = AI torpedo
    this.scale = 1.0;         // body scale (1.6 for BIG)
    this.tailRate = 0.06;     // sec between particle spawns (0.04 for FAST)
    this.tailBurst = 1;       // particles per spawn (2 for FAST)
    this.tailSpdMul = 1.0;    // tail speed multiplier (1.6 for FAST)
  }

  update(dt) {
    this.age += dt;
    if (this.age >= this.life) { this.alive = false; return; }

    this.x += Math.cos(this.heading) * this.speed * dt;
    this.y += Math.sin(this.heading) * this.speed * dt;

    // Y bounds (poles) → destroy silently; X wraps
    if (this.y < -50 || this.y > WORLD_H + 50) {
      this.alive = false;
      return;
    }
    this.x = wrapX(this.x);

    // Land impact: hit continent → explode
    if (isPointOnLand(this.x, this.y)) {
      spawnExplosion(this.x, this.y, this.scale);
      this.alive = false;
      return;
    }

    // Tail particle spawn
    this.tailTimer += dt;
    while (this.tailTimer >= this.tailRate && particles.length < 60) {
      this.tailTimer -= this.tailRate;
      for (let b = 0; b < this.tailBurst; b++) {
        const tx = this.x - Math.cos(this.heading) * 15 * this.scale;
        const ty = this.y - Math.sin(this.heading) * 15 * this.scale;
        const rvx = -Math.cos(this.heading) * 25 * this.tailSpdMul + (Math.random() - 0.5) * 30;
        const rvy = -Math.sin(this.heading) * 25 * this.tailSpdMul + (Math.random() - 0.5) * 30;
        particles.push(new Particle(tx, ty, rvx, rvy, 0.35 + Math.random() * 0.15,
          Math.random() < 0.5 ? '#ff6b35' : '#ff8c42', 2.5 + Math.random() * 1.5));
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);
    ctx.scale(this.scale, this.scale);

    // ── Body glow (subtle) ──
    const glowAlpha = this.scale > 1.3 ? 0.20 : 0.12;
    ctx.fillStyle = `rgba(255,107,53,${glowAlpha})`;
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();

    // ── Main spindle body ──
    const grad = ctx.createLinearGradient(-15, 0, 15, 0);
    grad.addColorStop(0, '#ff6b35');
    grad.addColorStop(0.5, '#ff5722');
    grad.addColorStop(1, '#e03000');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#cc3000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-14, 0);
    ctx.bezierCurveTo(-11, -2.6, 8, -3.0, 14, -0.8);
    ctx.quadraticCurveTo(15.5, 0, 14, 0.8);
    ctx.bezierCurveTo(8, 3.0, -11, 2.6, -14, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // ── Highlight line ──
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(-8, -1.5);
    ctx.bezierCurveTo(0, -2, 8, -2, 12, -0.3);
    ctx.stroke();

    // ── Rear fins ──
    ctx.fillStyle = '#e05520';
    ctx.strokeStyle = '#b82800';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(-8, -2.4);
    ctx.lineTo(-12, -5.5);
    ctx.lineTo(-10.5, -5.5);
    ctx.lineTo(-6.5, -2.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-8, 2.4);
    ctx.lineTo(-12, 5.5);
    ctx.lineTo(-10.5, 5.5);
    ctx.lineTo(-6.5, 2.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.restore();
  }

  isDead() { return !this.alive; }
}

// ═══════════════════════════════════════════
//  PARTICLE CLASS
// ═══════════════════════════════════════════
class Particle {
  constructor(x, y, vx, vy, life, color, radius) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = life;
    this.maxLife = life;
    this.color = color;
    this.radius = radius;
  }

  update(dt) {
    this.life -= dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  draw(ctx) {
    if (this.life <= 0) return;
    const t = this.life / this.maxLife;
    const r = this.radius * t;
    if (r < 0.2) return;
    ctx.globalAlpha = t;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  isDead() { return this.life <= 0; }
}

// ═══════════════════════════════════════════
//  SKILL PACK CLASS
// ═══════════════════════════════════════════
class SkillPack {
  constructor(x, y, typeId) {
    this.x = x;
    this.y = y;
    this.typeId = typeId;
    this.def = SKILL_DEFS[typeId];
    this.age = 0;
    this.alive = true;
    this.baseY = y;
    this.haloAngle = Math.random() * Math.PI * 2;
  }

  update(dt) {
    this.age += dt;
    this.haloAngle += dt * 2.5;
  }

  draw(ctx) {
    const fy = this.baseY + Math.sin(this.age * Math.PI) * 3;
    const isBlue = this.def.tier === 'blue';

    ctx.save();
    ctx.translate(this.x, fy);

    // ── Outer glow ──
    ctx.fillStyle = isBlue ? 'rgba(79,172,254,0.13)' : 'rgba(246,211,101,0.13)';
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill();

    // ── Main orb ──
    const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 12);
    if (isBlue) {
      grad.addColorStop(0, '#e0f0ff');
      grad.addColorStop(0.4, '#4facfe');
      grad.addColorStop(1, '#0066cc');
    } else {
      grad.addColorStop(0, '#fff8e0');
      grad.addColorStop(0.4, '#f6d365');
      grad.addColorStop(1, '#cc8800');
    }
    ctx.fillStyle = grad;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // ── Icon symbol (simple: blue dot / gold diamond) ──
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 0.7;
    if (isBlue) {
      ctx.beginPath();
      ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(0, -4.5);
      ctx.lineTo(4.5, 0);
      ctx.lineTo(0, 4.5);
      ctx.lineTo(-4.5, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // ── Rotating halo particles (2-3 dots) ──
    const haloCount = isBlue ? 2 : 3;
    for (let i = 0; i < haloCount; i++) {
      const a = this.haloAngle + (i / haloCount) * Math.PI * 2;
      const rx = Math.cos(a) * 15;
      const ry = Math.sin(a) * 12;
      ctx.fillStyle = isBlue ? 'rgba(180,220,255,0.8)' : 'rgba(255,240,200,0.8)';
      ctx.beginPath();
      ctx.arc(rx, ry, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  isDead() { return !this.alive; }
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════
const camera = { x: 0, y: 0, tx: 0, ty: 0 };

function updateCamera(targetX, targetY, dt) {
  const dx = wrappedDistX(camera.x, targetX);
  camera.tx = camera.x + dx; camera.ty = targetY;
  const lerp = 1 - Math.exp(-8 * dt);
  camera.x += (camera.tx - camera.x) * lerp;
  camera.y += (camera.ty - camera.y) * lerp;
  camera.y = Math.max(canvas.height/4, Math.min(WORLD_H - canvas.height/4, camera.y));
}
function updateCamera2(targetX, targetY, dt) {
  const dx = wrappedDistX(camera2.x, targetX);
  camera2.tx = camera2.x + dx; camera2.ty = targetY;
  const lerp = 1 - Math.exp(-8 * dt);
  camera2.x += (camera2.tx - camera2.x) * lerp;
  camera2.y += (camera2.ty - camera2.y) * lerp;
  camera2.y = Math.max(canvas.height/4, Math.min(WORLD_H - canvas.height/4, camera2.y));
}

// ═══════════════════════════════════════════
//  SHARED SUBMARINE BODY DRAWING
// ═══════════════════════════════════════════
function subPalette(idx) { const c = SUB_COLORS[idx]; return c; }

function drawSubBody(ctx, opts = {}) {
  const pal = opts.palette || subPalette(0);
  const { stealthGlow = false, propSpeedMul = 1.0 } = opts;

  // ── Stealth glow ──
  if (stealthGlow) {
    const pulse = 1 + Math.sin(performance.now() * 0.005) * 0.3;
    ctx.fillStyle = `${pal.hl}${(0.15*pulse).toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Dive planes (rear fins) ──
  ctx.fillStyle = pal.fin; ctx.strokeStyle = pal.finS; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-18, -10); ctx.lineTo(-28, -16); ctx.lineTo(-28, -12); ctx.lineTo(-18, -10);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-18, 10); ctx.lineTo(-28, 16); ctx.lineTo(-28, 12); ctx.lineTo(-18, 10);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // ── Propeller hub ──
  ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#0d0d0d'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(-30, 0, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Propeller blades
  ctx.fillStyle = '#222'; ctx.strokeStyle = '#111'; ctx.lineWidth = 0.8;
  for (let i = 0; i < 3; i++) {
    const a = (i / 3) * Math.PI * 2 + performance.now() * 0.008 * propSpeedMul;
    ctx.save(); ctx.translate(-30, 0); ctx.rotate(a);
    ctx.beginPath(); ctx.ellipse(5, 0, 7, 2.2, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // ── Main hull ──
  ctx.fillStyle = pal.body; ctx.strokeStyle = pal.bodyS; ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(-28, 0);
  ctx.bezierCurveTo(-24, -11, 16, -12, 28, -4);
  ctx.quadraticCurveTo(32, 0, 28, 4);
  ctx.bezierCurveTo(16, 12, -24, 11, -28, 0);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── Hull highlight ──
  ctx.strokeStyle = pal.hl + '0.25)'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-22, -4); ctx.bezierCurveTo(-10, -8, 10, -8.5, 24, -2); ctx.stroke();

  // ── Hull panel seams ──
  ctx.strokeStyle = 'rgba(20,30,40,0.5)'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.moveTo(-8, -10.5); ctx.lineTo(-8, 10.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -11); ctx.lineTo(6, 11); ctx.stroke();

  // ── Sonar dome ──
  ctx.fillStyle = '#c0392b'; ctx.strokeStyle = '#8b1a1a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(27, 0, 2.8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // ── Sail ──
  ctx.fillStyle = pal.sail; ctx.strokeStyle = pal.finS; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-4, -11); ctx.lineTo(10, -11); ctx.lineTo(12, -16);
  ctx.quadraticCurveTo(13, -21, 10, -22);
  ctx.lineTo(-2, -22);
  ctx.quadraticCurveTo(-5, -21, -4, -18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // ── Sail highlight ──
  ctx.strokeStyle = pal.hl + '0.22)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-1, -20.5); ctx.lineTo(8, -20.5); ctx.stroke();

  // ── Sail window ──
  ctx.fillStyle = '#5dade2'; ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(3, -17.5, 2.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(2.2, -18.3, 0.7, 0, Math.PI * 2); ctx.fill();

  // ── Periscope ──
  ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#0d0d0d'; ctx.lineWidth = 0.8;
  ctx.fillRect(6, -24, 1.4, 3.5); ctx.strokeRect(6, -24, 1.4, 3.5);
  ctx.fillRect(5.5, -25, 2.4, 1.2); ctx.strokeRect(5.5, -25, 2.4, 1.2);

  // ── Bow dive planes ──
  ctx.fillStyle = pal.fin; ctx.strokeStyle = pal.finS; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(10, -11); ctx.lineTo(12, -15); ctx.lineTo(16, -15); ctx.lineTo(14, -11);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10, 11); ctx.lineTo(12, 15); ctx.lineTo(16, 15); ctx.lineTo(14, 11);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // ── Propeller shaft ──
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-28, 0); ctx.lineTo(-33, 0); ctx.stroke();
}

// ═══════════════════════════════════════════
//  SUBMARINE CLASS
// ═══════════════════════════════════════════
class Submarine {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.heading = 0;        // radians, 0 = east
    this.speed = 0;          // world-units/sec
    this.angularVel = 0;
    this.colR = 16;          // collision radius

    // Tuning
    this.maxSpeed    = 280;
    this.accel       = 180;
    this.brake       = 100;
    this.turnRate    = 1.8;
    this.turnAccel   = 3.5;
    this.turnDamping = 3.0;

    // Stealth state
    this.stealthActive = false;
    this._origMaxSpeed = 280;
    this._origAccel = 180;

    // HP + State machine
    this.hp = 100; this.maxHp = 100;
    this.alive = true;
    this.state = 'alive'; // 'alive' | 'sinking' | 'dead'
    this.sinkOpacity = 1;
    this.sinkRotation = 0;
    this.respawnTimer = 0;
    this.invincibleTimer = 0;
    this.fadeInTimer = 0;
    this.wreckX = 0; this.wreckY = 0; this.wreckTimer = 0;
    this.colorIdx = 0; // blue = player
    this.palette = subPalette(0);
    this.isPlayer = true;
    this.kills = 0;
  }

  update(dt) {
    // ── Sinking animation ──
    if (this.state === 'sinking') {
      this.y += 48 * dt;
      this.x = wrapX(this.x); // X-axis cylinder wrap
      this.sinkRotation += 1.2 * dt;
      this.sinkOpacity -= 0.9 * dt;
      // Bubble particles
      if (Math.random() < dt * 18) {
        const bx = this.x + (Math.random() - 0.5) * 20;
        const by = this.y + (Math.random() - 0.5) * 12;
        particles.push(new Particle(bx, by,
          (Math.random() - 0.5) * 15, -20 - Math.random() * 30,
          0.7 + Math.random() * 0.5, '#87CEEB', 1.5 + Math.random() * 2.5));
      }
      if (this.sinkOpacity <= 0) {
        this.sinkOpacity = 0;
        this.state = 'dead';
        this.alive = false;
        this.respawnTimer = 3;
      }
      return;
    }
    if (this.state === 'dead') return;

    // ── Timers ──
    if (this.fadeInTimer > 0) this.fadeInTimer -= dt;
    if (this.invincibleTimer > 0) this.invincibleTimer -= dt;

    // ── Rotation ──
    const inp = arguments[1] || null;
    let turnInput = 0;
    if (inp) {
      if (inp.a || inp.left) turnInput = -1;
      if (inp.d || inp.right) turnInput = 1;
    } else {
      if (keys['a'] || keys['arrowleft'])  turnInput = -1;
      if (keys['d'] || keys['arrowright']) turnInput =  1;
    }

    if (turnInput !== 0) {
      this.angularVel += turnInput * this.turnAccel * dt;
      this.angularVel = Math.max(-this.turnRate, Math.min(this.turnRate, this.angularVel));
    } else {
      this.angularVel *= (1 - Math.min(this.turnDamping * dt, 1));
    }
    this.heading += this.angularVel * dt;
    while (this.heading >  Math.PI * 2) this.heading -= Math.PI * 2;
    while (this.heading < -Math.PI * 2) this.heading += Math.PI * 2;

    // ── Thrust ──
    let thrust = 0;
    if (inp) {
      if (inp.w || inp.up)    thrust =  1;
      if (inp.s || inp.down)  thrust = -1;
    } else {
      if (keys['w'] || keys['arrowup'])    thrust =  1;
      if (keys['s'] || keys['arrowdown'])  thrust = -1;
    }

    if (thrust !== 0) {
      this.speed += thrust * this.accel * dt;
      this.speed = Math.max(-this.maxSpeed * 0.5, Math.min(this.maxSpeed, this.speed));
    } else {
      if (Math.abs(this.speed) < 0.5) {
        this.speed = 0;
      } else {
        this.speed *= (1 - Math.min(this.brake * dt / this.maxSpeed, 1));
      }
    }

    // ── Position with land collision ──
    const dx = Math.cos(this.heading) * this.speed * dt;
    const dy = Math.sin(this.heading) * this.speed * dt;

    let newX = this.x + dx;
    let newY = this.y + dy;

    // X wraps (cylinder), Y clamps (poles)
    newX = wrapX(newX);
    newY = Math.max(this.colR, Math.min(WORLD_H - this.colR, newY));

    // --- Land collision check ---
    if (checkLandCollision(newX, newY, this.colR)) {
      // Full movement blocked; try sliding along shoreline
      const canX = !checkLandCollision(newX, this.y, this.colR);
      const canY = !checkLandCollision(this.x, newY, this.colR);

      let moved = false;
      if (canX) {
        this.x = newX;
        moved = true;
      }
      if (canY) {
        this.y = newY;
        moved = true;
      }

      if (moved) {
        // Shore-scraping friction
        this.speed *= 0.90;
      }
      // If neither axis works, submarine is blocked — stays in place
    } else {
      // No collision, accept full movement
      this.x = newX;
      this.y = newY;
    }

    // Safety: if submarine somehow ended up on land (e.g. spawned there),
    // push it toward open water by scanning outward
    if (isPointOnLand(this.x, this.y)) {
      this._pushToOcean();
    }
  }

  // Emergency push-out: scan in expanding circles to find nearest ocean
  _pushToOcean() {
    for (let r = 5; r <= 200; r += 8) {
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2;
        const tx = this.x + Math.cos(a) * r;
        const ty = this.y + Math.sin(a) * r;
        if (!checkLandCollision(tx, ty, this.colR)) {
          this.x = tx;
          this.y = ty;
          this.speed = 0;
          return;
        }
      }
    }
  }

  drawHPBar(ctx) {
    if (this.hp >= this.maxHp) return;
    const w = 30, h = 3.5;
    const ratio = this.hp / this.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(-w/2, -26, w, h);
    ctx.fillStyle = ratio > 0.5 ? '#2ecc71' : ratio > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(-w/2, -26, w * ratio, h);
  }

  draw(ctx) {
    if (this.state === 'dead') return;

    ctx.save();
    ctx.translate(this.x, this.y);

    if (this.state === 'sinking') {
      // Tilted sinking sub
      ctx.rotate(this.heading + this.sinkRotation);
      ctx.globalAlpha = this.sinkOpacity;
      drawSubBody(ctx, { palette: this.palette, stealthGlow: false, propSpeedMul: 0 });
      ctx.restore();
      return;
    }

    // Alive — handle fade-in + invincibility flash
    ctx.rotate(this.heading);
    let alpha = 1;
    if (this.fadeInTimer > 0) alpha = 1 - this.fadeInTimer / 0.5;
    if (this.invincibleTimer > 0) {
      const flashPeriod = 0.083;
      if (Math.floor(this.invincibleTimer / flashPeriod) % 2 === 0) alpha *= 0.35;
    }
    const glow = this.stealthActive;
    const pMul = this.stealthActive ? 0.5 : 1.0;
    if (this.stealthActive) ctx.globalAlpha = 0;
    else if (alpha < 1) ctx.globalAlpha = alpha;
    drawSubBody(ctx, { palette: this.palette, stealthGlow: glow, propSpeedMul: pMul });
    if (!this.stealthActive) this.drawHPBar(ctx);
    if (this.stealthActive) ctx.globalAlpha = 1;
    else if (alpha < 1) ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
//  DECOY CLASS  (fake submarine for DECOY skill)
// ═══════════════════════════════════════════
class Decoy {
  constructor(x, y, heading, speed) {
    this.x = x;
    this.y = y;
    this.heading = heading;
    this.speed = speed * 0.7;
    this.life = 10; // seconds
    this.age = 0;
    this.alive = true;
  }

  update(dt) {
    this.age += dt;
    if (this.age >= this.life) { this.alive = false; return; }
    // Random wander
    this.heading += (Math.random() - 0.5) * 0.52 * dt;
    const dx = Math.cos(this.heading) * this.speed * dt;
    const dy = Math.sin(this.heading) * this.speed * dt;
    let nx = this.x + dx;
    let ny = this.y + dy;
    // Drag
    this.speed *= (1 - Math.min(0.3 * dt, 1));
    // Land collision (same as real sub)
    if (checkLandCollision(nx, ny, 14)) {
      const canX = !checkLandCollision(nx, this.y, 14);
      const canY = !checkLandCollision(this.x, ny, 14);
      if (canX) { this.x = nx; this.speed *= 0.92; }
      if (canY) { this.y = ny; this.speed *= 0.92; }
    } else {
      this.x = nx;
      this.y = ny;
    }
    // Safety push
    if (isPointOnLand(this.x, this.y)) {
      for (let r = 5; r <= 150; r += 8) {
        for (let i = 0; i < 16; i++) {
          const a = (i / 16) * Math.PI * 2;
          const tx = this.x + Math.cos(a) * r;
          const ty = this.y + Math.sin(a) * r;
          if (!checkLandCollision(tx, ty, 14)) { this.x = tx; this.y = ty; this.speed *= 0.5; return; }
        }
      }
    }
    // X wrap
    this.x = wrapX(this.x);
    // Y clamp
    this.y = Math.max(0, Math.min(WORLD_H, this.y));
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);
    drawSubBody(ctx, { stealthGlow: false, propSpeedMul: 1.0 });
    ctx.restore();
  }

  isDead() { return !this.alive; }
}

// ═══════════════════════════════════════════
//  AI SUBMARINE CLASS
// ═══════════════════════════════════════════
class AISub {
  constructor(x, y, colorIdx) {
    this.x = x; this.y = y;
    this.heading = Math.random() * Math.PI * 2;
    this.speed = 40 + Math.random() * 60;
    this.colR = 14;
    this.palette = subPalette(colorIdx);
    this.colorIdx = colorIdx;
    this.hp = 80; this.maxHp = 80;
    this.alive = true;
    this.respawnTimer = 0;
    this.fireCD = 0;
    this.reactionTimer = 0;
    this.targetHeading = this.heading;
    this.state = 'patrol';
    this.stateTimer = 0;
    this.passiveSkill = null;
    this.activeSkill = null;
    this.isStealth = false;
    this.stealthTimer = 0;
    this.hasTarget = false;
    this.showHP = 0;
    // wreck
    this.wreckX = 0; this.wreckY = 0; this.wreckTimer = 0;
    this.rebuildTimer = 0;
    // stuck detection
    this.stuckTimer = 0;
    this.prevX = x; this.prevY = y;
    this.escapeBoost = 0;
    // combat
    this._dodgeTimer = 0;
    this._dodgeDir = 1;
  }

  _findTarget() {
    let best = null, bestD = Infinity;
    // P1
    if (sub.state === 'alive') {
      const dpdx = wrappedDistX(this.x, sub.x), dpdy = this.y - sub.y;
      const dpd = Math.sqrt(dpdx*dpdx + dpdy*dpdy);
      if (dpd < bestD) { bestD = dpd; best = { x:sub.x, y:sub.y, vx:Math.cos(sub.heading)*sub.speed, vy:Math.sin(sub.heading)*sub.speed, type:'player', ref:sub, id:'P1' }; }
    }
    // P2
    if (dualMode && sub2.state === 'alive') {
      const d2dx = wrappedDistX(this.x, sub2.x), d2dy = this.y - sub2.y;
      const d2d = Math.sqrt(d2dx*d2dx + d2dy*d2dy);
      if (d2d < bestD) { bestD = d2d; best = { x:sub2.x, y:sub2.y, vx:Math.cos(sub2.heading)*sub2.speed, vy:Math.sin(sub2.heading)*sub2.speed, type:'player', ref:sub2, id:'P2' }; }
    }
    return best;
  }

  _findNearestSkill() {
    let best = null, bestD = Infinity;
    for (const s of skills) {
      const ddx = wrappedDistX(this.x, s.x), ddy = this.y - s.y;
      const d = Math.sqrt(ddx*ddx + ddy*ddy);
      // Prefer blue skills
      const score = d + (s.def.tier === 'blue' ? 0 : 300);
      if (score < bestD) { bestD = score; best = s; }
    }
    // Only return if within reasonable range
    if (best && Math.sqrt(Math.pow(wrappedDistX(this.x,best.x),2) + Math.pow(this.y-best.y,2)) < 2500) return best;
    return null;
  }

  _steerTo(targetX, targetY, aggressiveness, dt) {
    const dx = wrappedDistX(this.x, targetX), dy = targetY - this.y;
    this.targetHeading = Math.atan2(dy, dx);
    // Land look-ahead: deflect if heading toward land
    const aheadX = this.x + Math.cos(this.heading) * 60;
    const aheadY = this.y + Math.sin(this.heading) * 60;
    if (isPointOnLand(aheadX, aheadY)) {
      // Try ±30° deflections, pick the one with more open water ahead
      let bestDeflect = 0, bestOpen = 0;
      for (const da of [0.52, -0.52, 0.7, -0.7, 1.05, -1.05]) {
        const ta = this.heading + da;
        const tx = this.x + Math.cos(ta) * 80;
        const ty = this.y + Math.sin(ta) * 80;
        let cnt = 0;
        for (let j = -1; j <= 1; j++) {
          if (!isPointOnLand(tx + Math.cos(ta + j * 0.2) * 20, ty + Math.sin(ta + j * 0.2) * 20)) cnt++;
        }
        if (cnt > bestOpen) { bestOpen = cnt; bestDeflect = da; }
      }
      this.targetHeading = this.heading + bestDeflect;
    }
    let dH = this.targetHeading - this.heading;
    while (dH > Math.PI) dH -= Math.PI*2; while (dH < -Math.PI) dH += Math.PI*2;
    this.heading += dH * aggressiveness * dt;
  }

  _move(dt, maxSpd, accel) {
    this.speed += accel * dt;
    this.speed = Math.max(20, Math.min(maxSpd, this.speed));
    this.speed *= (1 - 0.3 * dt);
    const mvx = Math.cos(this.heading) * this.speed * dt;
    const mvy = Math.sin(this.heading) * this.speed * dt;
    let nx = this.x + mvx, ny = this.y + mvy;
    ny = Math.max(10, Math.min(WORLD_H - 10, ny));
    if (checkLandCollision(nx, ny, this.colR)) {
      const cX = !checkLandCollision(nx, this.y, this.colR);
      const cY = !checkLandCollision(this.x, ny, this.colR);
      if (cX) { this.x = nx; this.speed *= 0.9; }
      if (cY) { this.y = ny; this.speed *= 0.9; }
    } else { this.x = nx; this.y = ny; }
    if (isPointOnLand(this.x, this.y)) {
      for (let r = 5; r <= 150; r += 8) {
        for (let i = 0; i < 16; i++) { const a = (i/16)*Math.PI*2; const tx = this.x+Math.cos(a)*r; const ty = this.y+Math.sin(a)*r; if (!checkLandCollision(tx,ty,this.colR)) { this.x=tx; this.y=ty; return; } }
      }
    }
    this.x = wrapX(this.x);
  }

  _tryFire(target, headingToTarget) {
    if (this.fireCD > 0) return;
    // Angle check: < 15°
    let dA = headingToTarget - this.heading;
    while (dA > Math.PI) dA -= Math.PI*2; while (dA < -Math.PI) dA += Math.PI*2;
    if (Math.abs(dA) < 15 * Math.PI/180) {
      this.fireCD = 2;
      const bx = this.x + Math.cos(this.heading)*32;
      const by = this.y + Math.sin(this.heading)*32;
      const m = new Missile(bx, by, this.heading);
      m.isEnemy = true; m.owner = this;
      if (this.passiveSkill) applyPassiveEffect(m, this.passiveSkill);
      // Consume passive
      if (this.passiveSkill) { this.passiveSkill.charges--; if (this.passiveSkill.charges <= 0) this.passiveSkill = null; }
      // MULTI
      if (this.passiveSkill && this.passiveSkill.typeId === 'MULTI_HEAD') {
        missiles.push(m);
        missiles.push(new Missile(bx, by, this.heading - 12*Math.PI/180));
        missiles.push(new Missile(bx, by, this.heading + 12*Math.PI/180));
        this.passiveSkill.charges--; if (this.passiveSkill.charges <= 0) this.passiveSkill = null;
      } else {
        missiles.push(m);
      }
    }
  }

  _autoUseActive(target) {
    if (!this.activeSkill) return;
    const sid = this.activeSkill.typeId;
    let use = false;
    if (sid === 'STEALTH' && this.hp < this.maxHp*0.5) use = true;
    if (sid === 'LASER' && target) {
      const ddx = wrappedDistX(this.x, target.x), ddy = this.y - target.y;
      const d = Math.sqrt(ddx*ddx + ddy*ddy);
      const aToT = Math.atan2(ddy, ddx);
      let dA = aToT - this.heading;
      while (dA > Math.PI) dA -= Math.PI*2; while (dA < -Math.PI) dA += Math.PI*2;
      if (d < 1000 && Math.abs(dA) < 0.5) use = true;
    }
    if (sid === 'DECOY') {
      for (const m of missiles) {
        if (!m.isEnemy && m.alive) {
          const ddx = wrappedDistX(this.x, m.x), ddy = this.y - m.y;
          if (Math.sqrt(ddx*ddx + ddy*ddy) < 200) { use = true; break; }
        }
      }
    }
    if (sid === 'MINE' && this.state === 'patrol' && Math.random() < 0.01) use = true;
    if (use) { this._activateSkill(sid); this.activeSkill = null; }
  }

  _activateSkill(sid) {
    if (sid === 'STEALTH') { this.isStealth = true; this.stealthTimer = 8; }
    if (sid === 'LASER') {
      lasers.length = 0;
      lasers.push({ x: this.x+Math.cos(this.heading)*32, y: this.y+Math.sin(this.heading)*32, angle: this.heading, length: 1500, life: 0.4, maxLife: 0.4 });
    }
    if (sid === 'DECOY') {
      decoys.push(new Decoy(this.x+(Math.random()-0.5)*40, this.y+(Math.random()-0.5)*40, this.heading+(Math.random()-0.5)*0.7, this.speed));
      decoys.push(new Decoy(this.x+(Math.random()-0.5)*40, this.y+(Math.random()-0.5)*40, this.heading+(Math.random()-0.5)*0.7, this.speed));
    }
    if (sid === 'MINE') {
      for (let i = 0; i < 3; i++) { const a = Math.random()*Math.PI*2; const d = 30+Math.random()*30; mines.push({ x:this.x+Math.cos(a)*d, y:this.y+Math.sin(a)*d, placedAt: performance.now()/1000, immuneUntil: performance.now()/1000+3, lifetime:60, radius:8, triggerR:60, alive:true, haloA:Math.random()*Math.PI*2 }); }
    }
  }

  update(dt) {
    // ── Timers ──
    if (this.isStealth) { this.stealthTimer -= dt; if (this.stealthTimer <= 0) this.isStealth = false; }
    if (this.respawnTimer > 0) { this.respawnTimer -= dt; if (this.respawnTimer <= 0) { this.rebuildTimer = 1; this.alive = true; this.x = this.wreckX; this.y = this.wreckY; } return; }
    if (this.rebuildTimer > 0) { this.rebuildTimer -= dt; if (this.rebuildTimer <= 0) { this.hp = this.maxHp; this._respawnRandom(); } return; }
    if (!this.alive) { if (this.wreckTimer > 0) this.wreckTimer -= dt; return; }
    if (this.showHP > 0) this.showHP -= dt;
    this.fireCD -= dt;
    if (this._dodgeTimer > 0) this._dodgeTimer -= dt;

    // ── Target perception ──
    const target = this._findTarget();
    const nearSkill = this._findNearestSkill();
    this.hasTarget = !!target;
    const hpRatio = this.hp / this.maxHp;

    // ── Stuck detection ──
    const disp = Math.sqrt(
      Math.pow(wrappedDistX(this.prevX, this.x), 2) +
      Math.pow(this.y - this.prevY, 2)
    );
    this.prevX = this.x; this.prevY = this.y;
    if (disp < 10 * dt) this.stuckTimer += dt;
    else this.stuckTimer = Math.max(0, this.stuckTimer - dt * 3);
    const isStuck = this.stuckTimer > 2;

    // ── State machine ──
    if (isStuck) {
      // State C: Unstuck
      this.state = 'unstuck';
      // Reverse
      this.speed -= 60 * dt;
      this.speed = Math.max(-80, this.speed);
      const rvx = Math.cos(this.heading) * this.speed * dt;
      const rvy = Math.sin(this.heading) * this.speed * dt;
      let nx = this.x + rvx, ny = this.y + rvy;
      if (!checkLandCollision(nx, ny, this.colR)) { this.x = nx; this.y = ny; }
      this.x = wrapX(this.x);
      // Find best escape angle
      let bestA = this.heading, bestOpen = 0;
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2;
        let cnt = 0;
        for (let j = 0; j < 7; j++) {
          const da = (j - 3) * 0.25;
          const tx = this.x + Math.cos(a + da) * 100;
          const ty = this.y + Math.sin(a + da) * 100;
          if (!isPointOnLand(tx, ty)) cnt++;
        }
        if (cnt > bestOpen) { bestOpen = cnt; bestA = a; }
      }
      this.targetHeading = bestA;
      let dH = this.targetHeading - this.heading;
      while (dH > Math.PI) dH -= Math.PI*2; while (dH < -Math.PI) dH += Math.PI*2;
      this.heading += dH * 2.5 * dt;
      this.speed += 120 * dt;
      this.speed = Math.max(30, Math.min(180, this.speed));
      // Emergency teleport after 5s stuck
      if (this.stuckTimer > 5) {
        const safe = findOpenWaterPos(120, 50);
        for (let f = 0; f < 12; f++) {
          const fa = (f / 12) * Math.PI * 2;
          particles.push(new Particle(this.x + Math.cos(fa) * 20, this.y + Math.sin(fa) * 20, 0, 0, 0.4, '#ffffff', 4));
        }
        this.x = safe.x; this.y = safe.y;
        this.stuckTimer = 0; this.prevX = this.x; this.prevY = this.y;
      }
      return;
    }

    // ── Low HP flee ──
    if (hpRatio < 0.3 && target) {
      this.state = 'flee';
      this._steerTo(target.x, target.y, -2.0, dt);
      this._move(dt, 220, 200);
      this._autoUseActive(target);
      return;
    }

    // ── Combat states with target ──
    if (target) {
      const ddx = wrappedDistX(this.x, target.x), ddy = this.y - target.y;
      const dist = Math.sqrt(ddx*ddx + ddy*ddy);
      // Predict player angular velocity for aiming strategy
      const tRef = target.ref;
      let angVel = 0;
      if (tRef && tRef.angularVel !== undefined) angVel = Math.abs(tRef.angularVel);
      const playerTurning = angVel > 0.8;

      if (dist > 250) {
        // ── State A: Chase ──
        this.state = 'chase';
        // Predict target position (0.3s lead)
        const lead = playerTurning ? 0 : 0.3;
        const predX = target.x + (target.vx||0) * lead;
        const predY = target.y + (target.vy||0) * lead;
        const pdx = wrappedDistX(this.x, predX), pdy = this.y - predY;
        const pDist = Math.sqrt(pdx*pdx + pdy*pdy);
        const aToT = Math.atan2(pdy, pdx);
        this._steerTo(predX, predY, 2.2, dt);
        this._move(dt, 180, 140);
        // Fire at long range if roughly aimed
        if (pDist < 500 && this.fireCD <= 0 && Math.abs(aToT - this.heading) < 0.3) {
          this._tryFire(target, aToT);
          this._dodgeTimer = 0.5;
          this._dodgeDir = Math.random() < 0.5 ? -1 : 1;
        }
      } else {
        // ── State B: Engage (dist <= 250) ──
        this.state = 'engage';
        // Check line-of-sight (no land between)
        let losBlocked = false;
        for (let s = 0.1; s <= 1; s += 0.1) {
          const sx = this.x + ddx * s;
          const sy = this.y + ddy * s;
          if (isPointOnLand(sx, sy)) { losBlocked = true; break; }
        }
        // Aim at player position (no prediction if turning; 0.3s lead if straight)
        const lead = playerTurning ? 0 : 0.3;
        const aimX = target.x + (target.vx||0) * lead;
        const aimY = target.y + (target.vy||0) * lead;
        const adx = wrappedDistX(this.x, aimX), ady = this.y - aimY;
        const aToT = Math.atan2(ady, adx);

        if (losBlocked) {
          // Can't see target, reposition
          this._steerTo(target.x, target.y, 2.0, dt);
          this._move(dt, 140, 100);
        } else {
          // Steer toward aim point
          this._steerTo(aimX, aimY, 2.5, dt);

          if (dist < 120) {
            // Too close, strafe
            const strafeA = this.heading + (Math.PI / 2) * (this._dodgeDir || 1);
            this.targetHeading = strafeA;
            let dH = this.targetHeading - this.heading;
            while (dH > Math.PI) dH -= Math.PI*2; while (dH < -Math.PI) dH += Math.PI*2;
            this.heading += dH * 2.5 * dt;
            this._move(dt, 100, 80);
          } else {
            this._move(dt, 90, 50);
          }

          // Fire when aimed (±15° ≈ 0.26 rad)
          if (this.fireCD <= 0 && Math.abs(aToT - this.heading) < 0.26) {
            this._tryFire(target, aToT);
            this.fireCD = 2.5;
            // Dodge after firing
            this._dodgeTimer = 0.5;
            this._dodgeDir = Math.random() < 0.5 ? -1 : 1;
          }
        }
      }
      // Dodge maneuver
      if (this._dodgeTimer > 0) {
        this.heading += this._dodgeDir * 2.5 * dt;
      }
      this._autoUseActive(target);
      return;
    }

    // ── No target: collect skill or patrol ──
    if (nearSkill && hpRatio >= 0.5) {
      this.state = 'collect';
      this._steerTo(nearSkill.x, nearSkill.y, 1.6, dt);
      this._move(dt, 140, 90);
    } else {
      this.state = 'patrol';
      this.aiTimer = (this.aiTimer||0) - dt;
      if (!this.aiTimer || this.aiTimer <= 0) {
        this.aiTimer = 1.5 + Math.random() * 2;
        this.targetHeading = Math.random() * Math.PI * 2;
      }
      let dH = this.targetHeading - this.heading;
      while (dH > Math.PI) dH -= Math.PI*2; while (dH < -Math.PI) dH += Math.PI*2;
      this.heading += dH * 0.9 * dt;
      this._move(dt, 110, 40);
      this._autoUseActive(null);
    }
  }

  die() {
    this.alive = false;
    spawnExplosion(this.x, this.y, 2.5);
    this.wreckX = this.x; this.wreckY = this.y; this.wreckTimer = 5;
    this.respawnTimer = 10;
    this.showHP = 0;
  }

  _respawnRandom() {
    const pos = findOpenWaterPos(120, 50);
    this.x = pos.x; this.y = pos.y;
    this.speed = 40 + Math.random()*60;
    this.fireCD = 1;
    this.reactionTimer = 0.3;
    this.hp = this.maxHp;
    this.passiveSkill = null; this.activeSkill = null; this.isStealth = false;
    this.stuckTimer = 0; this.escapeBoost = 0;
    this._dodgeTimer = 0; this._dodgeDir = 1;
  }

  draw(ctx) {
    // Wreck marker
    if (!this.alive && this.wreckTimer > 0 && this.respawnTimer > 0) {
      ctx.fillStyle = 'rgba(128,128,128,0.5)';
      ctx.beginPath(); ctx.arc(this.wreckX, this.wreckY, 5, 0, Math.PI*2); ctx.fill();
    }
    // Rebuild particles
    if (this.rebuildTimer > 0 && this.alive) {
      const t = 1 - this.rebuildTimer;
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + t*3;
        const r = (1-t) * 40;
        ctx.fillStyle = `rgba(200,200,200,${0.6*(1-t)})`;
        ctx.beginPath(); ctx.arc(this.x+Math.cos(a)*r, this.y+Math.sin(a)*r, 2, 0, Math.PI*2); ctx.fill();
      }
    }
    if (!this.alive || this.rebuildTimer > 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.heading);

    // Stealth
    if (this.isStealth) ctx.globalAlpha = 0;
    // Tail glow: chase=bright, flee=dim
    let tailAlpha = 1.0;
    if (this.state === 'attack') tailAlpha = 1.3;
    if (this.state === 'flee') tailAlpha = 0.7;
    ctx.globalAlpha = (this.isStealth ? 0 : 1) * Math.min(tailAlpha, 1.3);

    drawSubBody(ctx, { palette: this.palette, stealthGlow: this.isStealth, propSpeedMul: this.state==='flee'?0.5:1.0 });
    ctx.globalAlpha = 1;

    // HP bar (2s after damage)
    if (this.showHP > 0) {
      const w = 28, h = 3, ratio = this.hp / this.maxHp;
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-w/2, -26, w, h);
      ctx.fillStyle = ratio > 0.5 ? '#2ecc71' : ratio > 0.25 ? '#f39c12' : '#e74c3c';
      ctx.fillRect(-w/2, -26, w * ratio, h);
    }
    ctx.restore();
  }

  isDead() { return false; }
}
