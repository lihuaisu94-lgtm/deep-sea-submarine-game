// North Atlantic Ocean (well between N America ~1300 and Europe ~2150)
const sub = new Submarine(1750, 750);
const sub2 = new Submarine(1800, 800);
let dualMode = false;

// Verify spawn point is ocean
if (isPointOnLand(sub.x, sub.y)) {
  sub.x = 1400; sub.y = 900;
}
sub2.palette = subPalette(1); sub2.colorIdx = 1; sub2.isPlayer = true;

// ── Missile & Particle state ──
const missiles = [];
const killNotifications = [];
const particles = [];
let launchCooldown = 0;
let p2LaunchCD = 0;
const MAX_MISSILES = 5;
const LAUNCH_CD = 0.5;

// ── Skill state ──
const skills = [];
const SKILL_SPAWN_INTERVAL = 10;
const MAX_SKILLS = 5;
let skillSpawnTimer = 5; // first spawn sooner

const player = {
  passiveSkill: null, activeSkill: null,
  isStealth: false, stealthTimer: 0,
};
const player2 = {
  passiveSkill: null, activeSkill: null,
  isStealth: false, stealthTimer: 0,
};

const decoys = [];
const lasers = [];
const mines = [];
const aiSubs = [];

function spawnPickupFX(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const spd = 40 + Math.random() * 60;
    particles.push(new Particle(x, y,
      Math.cos(a) * spd, Math.sin(a) * spd,
      0.25 + Math.random() * 0.1, '#ffffff', 2.5 + Math.random() * 2));
  }
}

function spawnSkill(x, y, typeId) {
  if (!SKILL_DEFS[typeId]) return;
  skills.push(new SkillPack(x, y, typeId));
}

function applyPassiveEffect(missile, passiveSkill) {
  switch (passiveSkill.typeId) {
    case 'MISSILE_BIG':
      missile.scale = 1.6;
      missile.tailRate = 0.06;
      missile.tailBurst = 1;
      break;
    case 'MISSILE_FAST':
      missile.speed = 2100;
      missile.life = 3.0;
      missile.tailRate = 0.04;
      missile.tailBurst = 2;
      missile.tailSpdMul = 1.6;
      break;
    case 'MULTI_HEAD':
      // MULTI is handled in launch (3-way split), missile itself unchanged
      break;
  }
}

// Stub: called on X key press
function activateSkill(pState, sInst) {
  if (!pState.activeSkill) return;
  const skill = pState.activeSkill;
  switch (skill.typeId) {
    case 'STEALTH': activateStealth(pState, sInst); break;
    case 'DECOY':   activateDecoy(sInst);           break;
    case 'LASER':   spawnLaser(sInst);              break;
    case 'MINE':    spawnMines(sInst);              break;
  }
  pState.activeSkill = null;
}

function activateStealth(pState, sInst) {
  pState.isStealth = true;
  pState.stealthTimer = 8;
  sInst.stealthActive = true;
  sInst._origMaxSpeed = sInst.maxSpeed;
  sInst._origAccel = sInst.accel;
  sInst.maxSpeed = Math.round(sInst._origMaxSpeed * 0.7);
  sInst.accel = Math.round(sInst._origAccel * 0.6);
}

function deactivateStealth(pState, sInst) {
  pState.isStealth = false;
  pState.stealthTimer = 0;
  sInst.stealthActive = false;
  sInst.maxSpeed = sInst._origMaxSpeed;
  sInst.accel = sInst._origAccel;
}

function activateDecoy(sInst) {
  decoys.length = 0;
  for (let i = 0; i < 2; i++) {
    const ox = sInst.x + (Math.random() - 0.5) * 40;
    const oy = sInst.y + (Math.random() - 0.5) * 40;
    const oh = sInst.heading + (Math.random() - 0.5) * 0.7;
    decoys.push(new Decoy(ox, oy, oh, sInst.speed));
  }
}

function spawnLaser(sInst) {
  const bowX = sInst.x + Math.cos(sInst.heading) * 32;
  const bowY = sInst.y + Math.sin(sInst.heading) * 32;
  lasers.length = 0;
  lasers.push({
    x: bowX, y: bowY,
    angle: sInst.heading,
    length: 1500,
    life: 0.4, maxLife: 0.4,
  });
  for (let i = 0; i < 12; i++) {
    const spread = (Math.random() - 0.5) * 1.0;
    const a = sInst.heading + spread;
    const spd = 80 + Math.random() * 160;
    particles.push(new Particle(bowX, bowY,
      Math.cos(a) * spd, Math.sin(a) * spd,
      0.12 + Math.random() * 0.08,
      Math.random() < 0.5 ? '#ff1a1a' : '#ff5555',
      2 + Math.random() * 3));
  }
}

function spawnMines(sInst) {
  const now = performance.now() / 1000;
  for (let i = 0; i < 3; i++) {
    const a = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    mines.push({
      x: sInst.x + Math.cos(a) * dist,
      y: sInst.y + Math.sin(a) * dist,
      placedAt: now,
      immuneUntil: now + 3,
      lifetime: 60,
      radius: 8,
      triggerR: 60,
      alive: true,
      pulsedAt: now,
      haloA: Math.random() * Math.PI * 2,
    });
  }
}

function spawnMineExplosion(x, y) {
  // White core flash
  particles.push(new Particle(x, y, 0, 0, 0.15, '#ffffff', 12));
  // 15 shockwave particles
  for (let i = 0; i < 15; i++) {
    const a = (i / 15) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const spd = 80 + Math.random() * 70;
    particles.push(new Particle(x, y,
      Math.cos(a) * spd, Math.sin(a) * spd,
      0.35 + Math.random() * 0.2,
      Math.random() < 0.5 ? '#ff4500' : '#ff0000',
      3 + Math.random() * 3));
  }
}

function spawnMuzzleFlash(x, y, heading) {
  for (let i = 0; i < 8; i++) {
    const spread = (Math.random() - 0.5) * 1.2;
    const a = heading + spread;
    const spd = 60 + Math.random() * 100;
    particles.push(new Particle(
      x + (Math.random() - 0.5) * 6,
      y + (Math.random() - 0.5) * 6,
      Math.cos(a) * spd,
      Math.sin(a) * spd,
      0.10 + Math.random() * 0.08,
      Math.random() < 0.4 ? '#ffffff' : '#ffcc80',
      2.5 + Math.random() * 2.5
    ));
  }
}

function spawnExplosion(x, y, scale = 1.0) {
  const isBig = scale > 1.3;

  // Core flash
  const coreR = isBig ? 20 : (8 * scale);
  const coreLife = isBig ? 0.25 : 0.10;
  particles.push(new Particle(x, y, 0, 0, coreLife, '#ffffff', coreR));

  // Shockwave ring
  const count = isBig ? 20 : Math.round(7 * scale);
  const fragLife = isBig ? 0.6 : (0.30 + Math.random() * 0.15);
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const spd = isBig ? (60 + Math.random() * 120) : ((50 + Math.random() * 80) * scale);
    // BIG: color gradient inner→outer
    let color;
    if (isBig) {
      const t = i / count; // 0=outer fast, ~1=inner slow
      if (t < 0.35) color = '#ff4500';      // outer deep red
      else if (t < 0.7) color = '#ff6b35';  // mid orange-red
      else color = '#ffaa00';                 // inner gold
    } else {
      color = Math.random() < 0.5 ? '#ff6b35' : '#ff4500';
    }
    particles.push(new Particle(x, y,
      Math.cos(a) * spd, Math.sin(a) * spd,
      fragLife, color,
      isBig ? (5 - (i / count) * 3) : ((3.0 + Math.random() * 2.0) * scale)));
  }

  // BIG: heavy debris chunks (slow, large, dark red)
  if (isBig) {
    for (let i = 0; i < 4; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = 30 + Math.random() * 50;
      particles.push(new Particle(x, y,
        Math.cos(a) * spd, Math.sin(a) * spd,
        0.8, '#8b0000', 6 + Math.random() * 4));
    }
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function drawGrid(ctx) {
  const step = 100;
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 0.35;
  ctx.beginPath();
  for (let x = 0; x <= WORLD_W; x += step) {
    ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H);
  }
  for (let y = 0; y <= WORLD_H; y += step) {
    ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y);
  }
  ctx.stroke();

  ctx.strokeStyle = GRID_MAJOR;
  ctx.lineWidth = 0.65;
  ctx.beginPath();
  for (let x = 0; x <= WORLD_W; x += 500) {
    ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H);
  }
  for (let y = 0; y <= WORLD_H; y += 500) {
    ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y);
  }
  ctx.stroke();
}

function drawContinents(ctx) {
  for (const cont of continents) {
    if (cont.points.length < 3) continue;
    ctx.fillStyle = LAND_FILL;
    ctx.strokeStyle = LAND_STROKE;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(cont.points[0][0], cont.points[0][1]);
    for (let i = 1; i < cont.points.length; i++) {
      ctx.lineTo(cont.points[i][0], cont.points[i][1]);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Subtle interior shadow for depth
    ctx.fillStyle = 'rgba(0,0,0,0.035)';
    ctx.beginPath();
    ctx.moveTo(cont.points[0][0], cont.points[0][1]);
    for (let i = 1; i < cont.points.length; i++) {
      ctx.lineTo(cont.points[i][0], cont.points[i][1]);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function drawOcean(ctx) {
  ctx.fillStyle = OCEAN_DEEP;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);
}

function drawWorldLayer(ctx) {
  drawOcean(ctx);
  drawGrid(ctx);
  drawContinents(ctx);
  drawMinesWrapped(ctx);
  for (const m of missiles) m.draw(ctx);
  for (const m of remoteMissiles) m.draw(ctx);
  for (const d of decoys) d.draw(ctx);
  for (const ai of aiSubs) ai.draw(ctx);
  // Remote players
  for (const [ci, rp] of remotePlayers) {
    if (!rp.alive) continue;
    ctx.save(); ctx.translate(rp.x, rp.y); ctx.rotate(rp.heading);
    drawSubBody(ctx, { palette: subPalette(ci), stealthGlow: false, propSpeedMul: 1.0 });
    // HP bar
    const w = 28, h = 3, ratio = (rp.hp||100) / 100;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-w/2, -26, w, h);
    ctx.fillStyle = ratio > 0.5 ? '#2ecc71' : ratio > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(-w/2, -26, w * ratio, h);
    ctx.restore();
  }
  sub.draw(ctx);
  if (dualMode) sub2.draw(ctx);
  drawLasersWrapped(ctx);
  for (const p of particles) p.draw(ctx);
  for (const s of skills) s.draw(ctx);
}

function drawMinesWrapped(ctx) {
  const now = performance.now() / 1000;
  for (const mine of mines) {
    for (const ox of [0, -WORLD_W, WORLD_W]) {
      const mx = mine.x + ox;
      const tSince = now - mine.placedAt;
      if (tSince < 0 || tSince > mine.lifetime) continue;
      // Pulsing every 4s
      const cycle = (tSince % 4);
      const pulsing = cycle < 0.3;
      const pulseT = pulsing ? (cycle / 0.3) : 0;
      const alpha = pulsing ? 0.15 + 0.45 * Math.sin(pulseT * Math.PI) : 0.15;
      const r = pulsing ? 6 + 4 * Math.sin(pulseT * Math.PI) : 6;

      // Subtle ring
      ctx.fillStyle = `rgba(139,0,0,${alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(mx, mine.y, r + 3, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.fillStyle = `rgba(139,0,0,${alpha})`;
      ctx.strokeStyle = `rgba(200,0,0,${alpha * 0.6})`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.arc(mx, mine.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Pulse particle
      if (pulsing && cycle < 0.05) {
        particles.push(new Particle(mx, mine.y,
          (Math.random()-0.5)*10, (Math.random()-0.5)*10,
          0.2, '#ff0000', 2));
      }
    }
  }
}

function drawLasersWrapped(ctx) {
  for (const l of lasers) {
    const t = l.life / l.maxLife; // 1→0
    const pulseW = 4 + Math.sin(t * Math.PI * 6) * 4; // 4↔12↔4
    const alpha = t;

    for (const ox of [0, -WORLD_W, WORLD_W]) {
      const x1 = l.x + ox;
      const y1 = l.y;
      const x2 = x1 + Math.cos(l.angle) * l.length;
      const y2 = y1 + Math.sin(l.angle) * l.length;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = '#ff1a1a';
      ctx.shadowBlur = 30;
      ctx.strokeStyle = '#ff1a1a';
      ctx.lineWidth = pulseW;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      // Inner white core (brighter)
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function renderDualMode() {
  const W = canvas.width, H = canvas.height, HH = Math.floor(H/2);

  // ── Helper: draw all world objects ──
  function drawAllObjects() {
    drawOcean(ctx); drawGrid(ctx); drawContinents(ctx); drawMinesWrapped(ctx);
    for (const m of missiles) m.draw(ctx);
    for (const m of remoteMissiles) m.draw(ctx);
    for (const s of skills) s.draw(ctx);
    for (const d of decoys) d.draw(ctx);
    for (const ai of aiSubs) ai.draw(ctx);
    for (const [ci, rp] of remotePlayers) {
      if (!rp.alive) continue;
      ctx.save(); ctx.translate(rp.x, rp.y); ctx.rotate(rp.heading);
      drawSubBody(ctx, { palette: subPalette(ci), stealthGlow: false, propSpeedMul: 1.0 });
      ctx.restore();
    }
    sub.draw(ctx);
    if (dualMode) sub2.draw(ctx);
    drawLasersWrapped(ctx);
    for (const p of particles) p.draw(ctx);
    // Labels
    for (const [so,l,lc] of [[sub,'P1','#4facfe'],[sub2,'P2','#e74c3c']]) {
      if (so.state !== 'dead') {
        ctx.save(); ctx.translate(so.x, so.y);
        if (so.state === 'sinking') { ctx.rotate(so.heading + so.sinkRotation); ctx.globalAlpha = so.sinkOpacity; }
        else ctx.rotate(so.heading);
        drawSubBody(ctx, { palette: so.palette, stealthGlow: so.state === 'alive' && so.stealthActive, propSpeedMul: so.state === 'alive' && so.stealthActive ? 0.5 : 0 });
        ctx.restore();
      }
      const status = so.state === 'alive' ? l : so.state === 'sinking' ? '↓' : '✝';
      const sc = so.state === 'alive' ? lc : so.state === 'sinking' ? '#f39c12' : '#7f8c8d';
      ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'center';
      const tw = ctx.measureText(status).width + 6;
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(so.x-tw/2, so.y-38, tw, 14);
      ctx.fillStyle = sc; ctx.fillText(status, so.x, so.y-27);
    }
  }

  // ── HUD helper ──
  function hudFor(subObj, baseY) {
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    const F = '10px Courier New'; ctx.font = F;
    const hpPct = subObj.hp/subObj.maxHp;
    const hpStr = hpPct>0.8?'♥♥♥♥♥':hpPct>0.6?'♥♥♥♥♡':hpPct>0.4?'♥♥♥♡♡':hpPct>0.2?'♥♥♡♡♡':'♥♡♡♡♡';
    const spd = Math.abs(subObj.speed*0.15).toFixed(1);
    const deg = String(Math.round(((-subObj.heading*180/Math.PI)%360+360)%360)).padStart(3,'0');
    const pos = `${Math.round(wrapX(subObj.x))},${Math.round(subObj.y)}`;
    const kills = subObj.kills||0;
    const aliveAI = aiSubs.filter(a=>a.alive).length;
    const pState = subObj===sub?player:player2;
    const ps = pState.passiveSkill;
    const as = pState.activeSkill;
    const psText = ps ? `${SKILL_DEFS[ps.typeId].label} x${ps.charges}` : '-';
    const asText = as ? `${SKILL_DEFS[as.typeId].label}` : '-';
    const depth = 180+Math.floor(Math.abs(subObj.speed)*0.1);

    // TL corner
    ctx.fillStyle = '#4a8db5'; ctx.textAlign='left';
    ctx.fillText('SPD',4,baseY+11); ctx.fillText('MISSILE',4,baseY+22); ctx.fillText('KILL',4,baseY+33); ctx.fillText('FOE',4,baseY+44);
    ctx.fillStyle = '#c3e0f0';
    ctx.fillText(spd,38,baseY+11); ctx.fillText(`${missiles.filter(m=>m.owner===subObj).length}/5`,56,baseY+22);
    ctx.fillText(kills,36,baseY+33); ctx.fillText(`${1+(sub2.state==='alive'?1:0)+aliveAI}/7`,34,baseY+44);

    // TR corner
    ctx.fillStyle = '#4a8db5'; ctx.textAlign='right';
    ctx.fillText('HDG',W-4,baseY+11); ctx.fillText('HP',W-4,baseY+22);
    ctx.fillStyle = '#c3e0f0';
    ctx.fillText(deg,W-4-28,baseY+11); ctx.fillText(hpStr,W-4,baseY+22);

    // BL corner
    ctx.fillStyle = '#4a8db5'; ctx.textAlign='left';
    ctx.fillText('POS',4,baseY+HH-24); ctx.fillText('PASSIVE',4,baseY+HH-13); ctx.fillText('STAT',4,baseY+HH-2);
    ctx.fillStyle = '#c3e0f0';
    ctx.fillText(pos,30,baseY+HH-24); ctx.fillText(psText,52,baseY+HH-13);
    const stText = subObj.state === 'alive' ? (subObj.invincibleTimer > 0 ? 'ALIVE⚡' : 'ALIVE') : subObj.state === 'sinking' ? 'SINKING' : 'RESPAWN';
    const stColor = subObj.state === 'alive' ? '#2ecc71' : subObj.state === 'sinking' ? '#f39c12' : '#7f8c8d';
    ctx.fillStyle = stColor; ctx.fillText(stText,34,baseY+HH-2);

    // BR corner
    ctx.fillStyle = '#4a8db5'; ctx.textAlign='right';
    ctx.fillText('ACTIVE',W-4,baseY+HH-24); ctx.fillText('DEPTH',W-4,baseY+HH-13);
    ctx.fillStyle = '#c3e0f0';
    ctx.fillText(asText,W-4-40,baseY+HH-24); ctx.fillText(depth+'M',W-4,baseY+HH-13);

    ctx.restore();
  }

  // ═══ TOP ═══
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.beginPath(); ctx.rect(0,0,W,HH); ctx.clip();
  ctx.fillStyle = OCEAN_DEEP; ctx.fillRect(0,0,W,HH);
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera.x), Math.round(HH/2-camera.y));
  drawAllObjects();
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera.x-WORLD_W), Math.round(HH/2-camera.y));
  drawAllObjects();
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera.x+WORLD_W), Math.round(HH/2-camera.y));
  drawAllObjects();
  hudFor(sub, 0);
  ctx.restore();

  ctx.fillStyle = '#4facfe'; ctx.fillRect(0, HH-1, W, 2);

  // ═══ BOTTOM ═══
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.beginPath(); ctx.rect(0,HH,W,H-HH); ctx.clip();
  ctx.fillStyle = OCEAN_DEEP; ctx.fillRect(0,HH,W,H-HH);
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera2.x), Math.round(HH+HH/2-camera2.y));
  drawAllObjects();
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera2.x-WORLD_W), Math.round(HH+HH/2-camera2.y));
  drawAllObjects();
  ctx.setTransform(1,0,0,1, Math.round(W/2-camera2.x+WORLD_W), Math.round(HH+HH/2-camera2.y));
  drawAllObjects();
  hudFor(sub2, HH);
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (dualMode) {
    renderDualMode();
  } else {
    const cx = Math.round(-camera.x + canvas.width / 2);
    const cy = Math.round(-camera.y + canvas.height / 2);
    for (const ox of [0, -WORLD_W, WORLD_W]) {
      ctx.save(); ctx.translate(cx + ox, cy); drawWorldLayer(ctx); ctx.restore();
    }
  }

  // ── UI update ──
  const speedKn = Math.abs(sub.speed * 0.15);
  document.getElementById('speed-val').textContent = speedKn.toFixed(1);
  const deg = (((-sub.heading * 180 / Math.PI) % 360) + 360) % 360;
  document.getElementById('head-val').textContent = String(Math.round(deg)).padStart(3, '0');
  document.getElementById('pos-val').textContent =
    `${Math.round(wrapX(sub.x))}, ${Math.round(sub.y)}`;
  document.getElementById('depth-val').textContent = String(180 + Math.floor(Math.abs(sub.speed) * 0.1));

  // Missile count UI
  const mCount = missiles.length;
  const missileEl = document.getElementById('missile-val');
  missileEl.textContent = `${mCount} / ${MAX_MISSILES}`;
  missileEl.style.color = mCount > 0 ? '#ff6b35' : '#4a5568';

  // Kill counter
  document.getElementById('kill-val').textContent = sub.kills;

  // Enemy sub count
  const aliveAI = aiSubs.filter(a => a.alive).length;
  const totalSubs = dualMode ? 7 : 5;
  document.getElementById('enemy-val').textContent = dualMode
    ? `存活 ${1 + (sub2.state === 'alive' ? 1 : 0) + aliveAI} / ${totalSubs}`
    : `${aliveAI} / 5`;
  if (dualMode) {
    document.getElementById('kill-val').textContent = `P1:${sub.kills} P2:${sub2.kills}`;
  } else {
    document.getElementById('kill-val').textContent = sub.kills;
  }

  // Time remaining (MP only)
  if (currentRoom && lastTimeLeft >= 0) {
    const min = Math.floor(lastTimeLeft / 60000), sec = Math.floor((lastTimeLeft % 60000) / 1000);
    document.getElementById('time-val').textContent = `${min}:${String(sec).padStart(2,'0')}`;
  }

  // Skill UI — passive (blue)
  const psvEl = document.getElementById('passive-val');
  if (player.passiveSkill) {
    const ps = player.passiveSkill;
    const def = SKILL_DEFS[ps.typeId];
    psvEl.innerHTML = `🔵 ${def.label} ×${ps.charges}`;
    psvEl.style.color = '#4facfe';
  } else {
    psvEl.innerHTML = '🔵 —';
    psvEl.style.color = '#4a5568';
  }

  // Skill UI — active (gold)
  const actEl = document.getElementById('active-val');
  if (player.isStealth) {
    actEl.innerHTML = `🟡 STLTH <span style="font-size:10px;color:#4facfe;">${player.stealthTimer.toFixed(1)}s</span>`;
    actEl.style.color = '#4facfe';
  } else if (player.activeSkill) {
    const as = player.activeSkill;
    const def = SKILL_DEFS[as.typeId];
    actEl.innerHTML = `🟡 ${def.label} <span style="font-size:10px;color:#f6d365;">[X]</span>`;
    actEl.style.color = '#f6d365';
  } else {
    actEl.innerHTML = '🟡 —';
    actEl.style.color = '#4a5568';
  }

  // Skill count HUD
  const scEl = document.getElementById('skill-count');
  if (skills.length > 0) {
    scEl.style.display = 'block';
    scEl.textContent = `⚡ 海域技能包: ${skills.length}/${MAX_SKILLS}`;
  } else {
    scEl.style.display = 'none';
  }

  // ── Kill notifications ──
  if (killNotifications.length > 0) {
    const W = canvas.width, H = canvas.height;
    const baseY = dualMode ? H * 0.45 : H * 0.42;
    ctx.font = 'bold 18px "Courier New", monospace';
    for (let i = 0; i < killNotifications.length; i++) {
      const n = killNotifications[i];
      const alpha = Math.min(1, n.timer / 0.3);
      const y = baseY + i * 32;
      const tw = ctx.measureText(n.text).width + 24;
      ctx.fillStyle = `rgba(0,0,0,${0.55 * alpha})`;
      ctx.fillRect(W / 2 - tw / 2, y - 14, tw, 28);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.textAlign = 'center';
      ctx.fillText(n.text, W / 2, y + 6);
    }
  }

}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
let lastTime = performance.now();

function gameLoop(time) {
  let dt = (time - lastTime) / 1000;
  lastTime = time;
  if (dt > 0.1) dt = 0.1;
  if (dt <= 0) dt = 0.016;

  const isMP = !!(currentRoom && ws && ws.readyState === WebSocket.OPEN);
  const p1Fire = dualMode ? p1Input.fire : keys[' '];
  const p1Skill = dualMode ? p1Input.skill : keys['x'];

  // ═══ SINGLE-PLAYER / DUAL SIMULATION ═══
  if (!isMP) {
  if (dualMode) { if (sub.alive) sub.update(dt, p1Input); if (sub2.alive) sub2.update(dt, p2Input); }
  else if (sub.alive) sub.update(dt);

  // ── Update missiles ──
  for (let i = missiles.length - 1; i >= 0; i--) {
    missiles[i].update(dt);
    if (missiles[i].isDead()) missiles.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt);
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  // ── Update skills ──
  for (let i = skills.length - 1; i >= 0; i--) {
    skills[i].update(dt);
  }

  // ── Skill auto-spawn (every SKILL_SPAWN_INTERVAL sec, max MAX_SKILLS) ──
  skillSpawnTimer -= dt;
  if (skillSpawnTimer <= 0 && skills.length < MAX_SKILLS) {
    skillSpawnTimer = SKILL_SPAWN_INTERVAL;
    // Try up to 20 times: ocean + >800px from existing skills
    for (let attempt = 0; attempt < 20; attempt++) {
      const sx = Math.random() * WORLD_W;
      const sy = Math.random() * WORLD_H;
      if (isPointOnLand(sx, sy)) continue;
      let tooClose = false;
      for (const s of skills) {
        const ddx = wrappedDistX(sx, s.x);
        const ddy = sy - s.y;
        if (Math.sqrt(ddx * ddx + ddy * ddy) < 800) { tooClose = true; break; }
      }
      if (tooClose) continue;
      const typeId = ALL_SKILL_IDS[Math.floor(Math.random() * ALL_SKILL_IDS.length)];
      spawnSkill(sx, sy, typeId);
      break;
    }
  }

  // ── Skill pickup detection (all subs) ──
  for (let i = skills.length - 1; i >= 0; i--) {
    const s = skills[i];
    const def = s.def;
    let picked = false;

    // P1
    if (sub.state === 'alive') {
      const dx = wrappedDistX(sub.x, s.x), dy = sub.y - s.y;
      if (Math.sqrt(dx * dx + dy * dy) < 40) {
        spawnPickupFX(s.x, s.y);
        if (def.tier === 'blue') { player.passiveSkill = { typeId: s.typeId, charges: def.charges }; player.activeSkill = null; }
        else { player.activeSkill = { typeId: s.typeId }; player.passiveSkill = null; }
        picked = true;
      }
    }
    // P2
    if (!picked && dualMode && sub2.state === 'alive') {
      const dx2 = wrappedDistX(sub2.x, s.x), dy2 = sub2.y - s.y;
      if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < 40) {
        spawnPickupFX(s.x, s.y);
        if (def.tier === 'blue') { player2.passiveSkill = { typeId: s.typeId, charges: def.charges }; player2.activeSkill = null; }
        else { player2.activeSkill = { typeId: s.typeId }; player2.passiveSkill = null; }
        picked = true;
      }
    }
    // AI
    if (!picked) {
      for (const ai of aiSubs) {
        if (!ai.alive) continue;
        const dax = wrappedDistX(ai.x, s.x), day = ai.y - s.y;
        if (Math.sqrt(dax * dax + day * day) < 40) {
          spawnPickupFX(s.x, s.y);
          if (def.tier === 'blue') { ai.passiveSkill = { typeId: s.typeId, charges: def.charges }; ai.activeSkill = null; }
          else { ai.activeSkill = { typeId: s.typeId }; ai.passiveSkill = null; }
          picked = true;
          break;
        }
      }
    }

    if (picked) skills.splice(i, 1);
  }

  // ── Player respawn ──
  for (const s of [sub, sub2]) {
    if (!s.alive) { s.respawnTimer -= dt; if (s.respawnTimer <= 0) { s.state = 'alive'; s.alive = true; s.hp = s.maxHp; s.fadeInTimer = 0.5; s.invincibleTimer = 2; s.x = 1400+Math.random()*800; s.y = 500+Math.random()*600; while (isPointOnLand(s.x,s.y)) { s.x = 1400+Math.random()*800; s.y = 500+Math.random()*600; } } }
  }

  // ── Update AI subs ──
  for (const ai of aiSubs) ai.update(dt);

  // ── Unified hit detection: all missiles vs all subs (except owner) ──
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    if (!m.alive) { missiles.splice(i,1); continue; }
    // Build target list
    const targets = [];
    if (m.owner !== sub && sub.state === 'alive') targets.push(sub);
    if (dualMode && m.owner !== sub2 && sub2.state === 'alive') targets.push(sub2);
    for (const ai of aiSubs) { if (ai.alive && m.owner !== ai) targets.push(ai); }
    let hit = false;
    for (const t of targets) {
      const ddx = wrappedDistX(t.x, m.x), ddy = t.y - m.y;
      if (Math.sqrt(ddx*ddx + ddy*ddy) < 20) {
        // Self-hit protection: first 0.5s don't hit self-launcher's own AI
        if (m.owner && m.owner === t) break;
        t.hp -= 25; if (t.showHP !== undefined) t.showHP = 2;
        spawnExplosion(m.x, m.y, 1.0); missiles.splice(i,1);
        if (t.hp <= 0) {
          spawnExplosion(t.x, t.y, 2.0);
          if (t === sub || t === sub2) {
            if (t.state === 'alive') {
              t.state = 'sinking';
              t.sinkOpacity = 1;
              t.sinkRotation = 0;
              const killerName = (m.owner === sub) ? 'P1' : (m.owner === sub2) ? 'P2' : 'AI';
              const victimName = (t === sub) ? 'P1' : 'P2';
              killNotifications.push({ text: `${killerName} 击沉了 ${victimName}!`, timer: 1.5 });
              if (m.owner && m.owner.isPlayer) m.owner.kills++;
            }
          } else if (t.die) {
            if (m.owner === sub) sub.kills++;
            else if (dualMode && m.owner === sub2) sub2.kills++;
            t.die();
          }
        }
        hit = true; break;
      }
    }
    if (hit) continue;
  }

  // ── Update decoys ──
  for (let i = decoys.length - 1; i >= 0; i--) {
    decoys[i].update(dt);
    if (decoys[i].isDead()) decoys.splice(i, 1);
  }

  // ── Stealth timer ──
  if (player.isStealth) {
    player.stealthTimer -= dt;
    if (player.stealthTimer <= 0) deactivateStealth(player, sub);
  }
  if (dualMode && player2.isStealth) {
    player2.stealthTimer -= dt;
    if (player2.stealthTimer <= 0) deactivateStealth(player2, sub2);
  }

  // ── Update lasers ──
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].life -= dt;
    if (lasers[i].life <= 0) lasers.splice(i, 1);
  }

  // ── Update mines ──
  const now = performance.now() / 1000;
  for (let i = mines.length - 1; i >= 0; i--) {
    const mine = mines[i];
    const age = now - mine.placedAt;
    // Lifetime expiry → silent remove
    if (age > mine.lifetime) { mines.splice(i, 1); continue; }
    // Collision check (after 3s immunity)
    if (age > 3) {
      if (sub.state === 'alive') {
        const dx = wrappedDistX(sub.x, mine.x);
        const dy = sub.y - mine.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < mine.triggerR) {
          spawnMineExplosion(mine.x, mine.y);
          mines.splice(i, 1);
        }
      }
    }
  }

  // ── Launch handling ──
  launchCooldown -= dt;
  p2LaunchCD -= dt;

  // ── P1 fire ──
  if (p1Fire && sub.state === 'alive' && launchCooldown <= 0 && missiles.length < MAX_MISSILES) {
    const bowX = sub.x + Math.cos(sub.heading) * 32;
    const bowY = sub.y + Math.sin(sub.heading) * 32;
    const ps = player.passiveSkill;

    if (ps && ps.typeId === 'MULTI_HEAD') {
      // 3-way fan: -12°, 0°, +12°
      const angles = [
        sub.heading - 12 * Math.PI / 180,
        sub.heading,
        sub.heading + 12 * Math.PI / 180,
      ];
      for (const a of angles) {
        if (missiles.length >= MAX_MISSILES) missiles.shift();
        const nm = new Missile(bowX, bowY, a); nm.owner = sub;
        missiles.push(nm);
        if (a === sub.heading && currentRoom) broadcastMissile(nm);
      }
      spawnMuzzleFlash(bowX, bowY, sub.heading);
      // Consume MULTI charge
      ps.charges -= 1;
      if (ps.charges <= 0) player.passiveSkill = null;
    } else {
      // Normal launch (single missile)
      const m = new Missile(bowX, bowY, sub.heading);
      if (ps) {
        applyPassiveEffect(m, ps);
        ps.charges -= 1;
        if (ps.charges <= 0) player.passiveSkill = null;
      }
      m.owner = sub;
      missiles.push(m);
      if (currentRoom) broadcastMissile(m);
      spawnMuzzleFlash(bowX, bowY, sub.heading);
    }

    launchCooldown = LAUNCH_CD;
    while (missiles.length > MAX_MISSILES) missiles.shift();
  }

  // ── P2 fire (dual mode, 0.5s cooldown) ──
  if (dualMode && p2Input.fire && sub2.state === 'alive' && p2LaunchCD <= 0 && missiles.length < MAX_MISSILES) {
    const p2bx = sub2.x + Math.cos(sub2.heading) * 32;
    const p2by = sub2.y + Math.sin(sub2.heading) * 32;
    const p2ps = player2.passiveSkill;
    if (p2ps && p2ps.typeId === 'MULTI_HEAD') {
      const angles = [sub2.heading - 12*Math.PI/180, sub2.heading, sub2.heading + 12*Math.PI/180];
      for (const a of angles) { if (missiles.length >= MAX_MISSILES) missiles.shift(); const nm = new Missile(p2bx, p2by, a); nm.owner = sub2; missiles.push(nm); }
      p2ps.charges -= 1; if (p2ps.charges <= 0) player2.passiveSkill = null;
    } else {
      const m2 = new Missile(p2bx, p2by, sub2.heading); m2.owner = sub2;
      if (p2ps) { applyPassiveEffect(m2, p2ps); p2ps.charges -= 1; if (p2ps.charges <= 0) player2.passiveSkill = null; }
      missiles.push(m2);
    }
    spawnMuzzleFlash(p2bx, p2by, sub2.heading);
    while (missiles.length > MAX_MISSILES) missiles.shift();
    p2LaunchCD = LAUNCH_CD;
  }
  } // end if (!isMP) — SP simulation complete

  // ── Remote missiles update (both modes, for visual effects) ──
  for (let i = remoteMissiles.length - 1; i >= 0; i--) {
    remoteMissiles[i].update(dt);
    if (remoteMissiles[i].isDead()) remoteMissiles.splice(i, 1);
  }

  // ── MP input send (20Hz) ──
  if (isMP) {
    physicsSendTimer -= dt;
    if (physicsSendTimer <= 0) { physicsSendTimer = 0.05; sendInput(); }
  }

  // ── MP fire: send to server ──
  if (isMP && keys[' ']) {
    if (!keys._mpFireSent) {
      keys._mpFireSent = true;
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'fire' }));
    }
  } else { keys._mpFireSent = false; }

  updateCamera(sub.x, sub.y, dt);
  if (dualMode) { updateCamera2(sub2.x, sub2.y, dt); }

  // Skill activation (P1: X, P2: -)
  if (p1Skill && player.activeSkill && !keys._xWasDown) { activateSkill(player, sub); }
  keys._xWasDown = p1Skill || false;
  if (dualMode && p2Input.skill && player2.activeSkill && !p2Input._skillWasDown) {
    activateSkill(player2, sub2);
  }
  p2Input._skillWasDown = p2Input.skill || false;

  // ── Update kill notifications ──
  for (let i = killNotifications.length - 1; i >= 0; i--) {
    killNotifications[i].timer -= dt;
    if (killNotifications[i].timer <= 0) killNotifications.splice(i, 1);
  }

  // Proximity warning
  const nearLand = checkLandCollision(sub.x, sub.y, sub.colR + 14);
  document.getElementById('collision-warn').style.display = nearLand ? 'block' : 'none';

  render();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function spawnAISubs() {
  aiSubs.length = 0;
  const colors = [1,2,3,4,5]; // red, orange, green, purple, cyan
  for (const ci of colors) {
    const pos = findOpenWaterPos(120, 50);
    aiSubs.push(new AISub(pos.x, pos.y, ci));
    console.log(`[AI spawn] color=${ci} pos=${pos.x.toFixed(0)},${pos.y.toFixed(0)} openness=OK`);
  }
}

const camera2 = { x: 1800, y: 800, tx: 1800, ty: 800 };

function startGame() {
  spawnAISubs();
  camera.x = sub.x; camera.y = sub.y;
  camera.tx = sub.x; camera.ty = sub.y;
  requestAnimationFrame(gameLoop);
}

function startDualGame() {
  dualMode = true;
  spawnAISubs();
  camera.x = sub.x; camera.y = sub.y; camera.tx = sub.x; camera.ty = sub.y;
  camera2.x = sub2.x; camera2.y = sub2.y; camera2.tx = sub2.x; camera2.ty = sub2.y;
  requestAnimationFrame(gameLoop);
}
</script>
